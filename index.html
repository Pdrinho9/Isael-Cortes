<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isael Cortes - Gestão Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; padding-bottom: 100px; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-tab { background: #10b981; color: #020617; box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(12px); padding: 20px; }
        .btn-whatsapp { background: #25D366; color: white; transition: all 0.3s ease; }
        @media (min-width: 1024px) { body { padding-bottom: 0; } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <div id="modal-senha" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-xs text-center border-emerald-500/20">
            <h3 class="text-xl font-black text-emerald-500 mb-4 italic uppercase">Admin</h3>
            <input type="password" id="input-senha-admin" placeholder="••••" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-4 text-white text-center text-2xl mb-6 outline-none">
            <div class="flex gap-3">
                <button onclick="fecharModais()" class="flex-1 py-3 text-slate-400 font-bold text-xs">Sair</button>
                <button onclick="confirmarSenhaAdmin()" class="flex-1 py-3 bg-emerald-500 text-slate-950 rounded-xl font-black uppercase text-xs">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-editor" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-md border-white/10">
            <h3 id="editor-titulo" class="text-2xl font-black text-white mb-8 text-center italic text-emerald-400 uppercase">Editar Registro</h3>
            <div id="editor-campos" class="space-y-4"></div>
            <div class="flex flex-col gap-3 mt-10">
                <div class="flex gap-3">
                    <button onclick="fecharModais()" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold text-xs text-slate-400">Cancelar</button>
                    <button id="btn-salvar-editor" class="flex-1 py-4 bg-emerald-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Salvar Alterações</button>
                </div>
                <button id="btn-excluir-item" class="w-full py-3 text-rose-500 font-bold text-[10px] uppercase tracking-widest hover:bg-rose-500/10 rounded-xl transition-all border border-rose-500/20">
                    <i data-lucide="trash-2" class="inline-block w-3 h-3 mr-1"></i> Excluir Permanentemente
                </button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-slate-900/40 border-r border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen z-50">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center"><i data-lucide="scissors" class="text-slate-950"></i></div>
                <h1 class="text-2xl font-black text-white uppercase italic tracking-tighter">Isael<span class="text-emerald-400">Cortes</span></h1>
            </div>
            <nav class="space-y-3 flex-1">
                <button onclick="switchTab('vendas')" id="btn-vendas" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black active-tab"><i data-lucide="plus-square"></i> NOVO SERVIÇO</button>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="bar-chart-3"></i> PAINEL</button>
                <button onclick="switchTab('clientes')" id="btn-clientes" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="users"></i> CLIENTES</button>
                <button onclick="switchTab('estoque')" id="btn-estoque" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="package"></i> ESTOQUE</button>
                <button onclick="switchTab('config')" id="btn-config" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="settings"></i> EQUIPE</button>
            </nav>
            <button id="logout-btn" onclick="fazerLogout()" class="hidden mt-auto flex items-center gap-2 text-rose-500 font-black text-[10px] uppercase hover:opacity-80">
                <i data-lucide="log-out" size="14"></i> Sair do Admin
            </button>
        </aside>

        <main class="flex-1 p-6 lg:p-16">
            <div id="tab-dashboard" class="tab-content hidden">
                <header class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-black text-white uppercase italic">Dashboard</h2>
                    <select id="filtro-tempo" onchange="renderizarTudo()" class="bg-emerald-500 text-slate-950 text-xs font-black rounded-xl px-6 py-3 outline-none">
                        <option value="hoje">Hoje</option><option value="total">Geral</option>
                    </select>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="glass p-8 rounded-[2.5rem]"><p class="text-[10px] font-black text-slate-500 mb-2 uppercase">Faturamento</p><h4 id="dash-faturamento" class="text-4xl font-black text-white italic">R$ 0,00</h4></div>
                    <div class="glass p-8 rounded-[2.5rem]"><p class="text-[10px] font-black text-slate-500 mb-2 uppercase">Comissões</p><h4 id="dash-comissoes" class="text-4xl font-black text-sky-400 italic">R$ 0,00</h4></div>
                    <div class="glass p-8 rounded-[2.5rem]"><p class="text-[10px] font-black text-slate-500 mb-2 uppercase">Produtos</p><h4 id="dash-produtos" class="text-4xl font-black text-purple-400 italic">R$ 0,00</h4></div>
                </div>
                
                <div class="bg-white/[0.02] rounded-[3rem] p-8 border border-white/5 mb-10">
                    <h3 class="text-xl font-black text-white mb-8 flex items-center gap-3 uppercase italic">Histórico de Atendimentos</h3>
                    <div id="log-vendas-horario" class="space-y-4 max-h-[500px] overflow-y-auto pr-4"></div>
                </div>

                <div id="lista-barbeiros-comissao" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <div id="tab-clientes" class="tab-content hidden">
                <div class="flex justify-between items-center mb-10 gap-6">
                    <h3 class="text-4xl font-black text-white uppercase italic">Clientes</h3>
                    <button onclick="abrirEditor('novo_cliente')" class="bg-emerald-500 text-slate-950 px-10 py-5 rounded-[2rem] font-black text-xs uppercase">Novo Cadastro +</button>
                </div>
                <div id="lista-completa-clientes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-estoque" class="tab-content hidden">
                <div class="flex justify-between items-center mb-10 gap-6">
                    <h3 class="text-4xl font-black text-white uppercase italic">Estoque</h3>
                    <button onclick="abrirEditor('novo_produto')" class="bg-purple-600 text-white px-10 py-5 rounded-[2rem] font-black text-xs uppercase">Adicionar Item +</button>
                </div>
                <div id="lista-estoque" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <div id="tab-config" class="tab-content hidden">
                <div class="max-w-xl mx-auto glass p-10 rounded-[3.5rem]">
                    <h3 class="text-3xl font-black text-white mb-10 italic text-center uppercase">Time Isael</h3>
                    <div id="lista-equipe" class="space-y-4 mb-10"></div>
                    <button onclick="abrirEditor('novo_barbeiro')" class="w-full py-5 bg-white/5 border border-white/10 rounded-2xl font-black text-xs text-emerald-400 uppercase">Adicionar Barbeiro</button>
                </div>
            </div>

            <div id="tab-vendas" class="tab-content">
                <div class="max-w-xl mx-auto glass p-10 lg:p-14 rounded-[4rem]">
                    <h3 class="text-3xl font-black text-white mb-10 text-center uppercase italic">Lançar Registro</h3>
                    <form id="form-venda" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="venda-barbeiro" class="bg-slate-900 border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required></select>
                            <select id="venda-cliente" class="bg-slate-900 border border-white/10 p-5 rounded-2xl text-white outline-none italic"></select>
                        </div>
                        <input type="text" id="venda-descricao" list="lista-itens-datalist" oninput="atualizarPrecoAutomatico()" placeholder="🔍 O que foi feito?" class="w-full bg-slate-900 border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required>
                        <datalist id="lista-itens-datalist"></datalist>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="venda-valor" placeholder="Valor R$" step="0.01" class="bg-slate-900 border border-white/10 p-5 rounded-2xl text-white outline-none font-black" required>
                            <select id="venda-pagamento" class="bg-slate-900 border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required>
                                <option value="">Pagamento...</option><option value="Pix">Pix</option><option value="Cartão">Cartão</option><option value="Dinheiro">Dinheiro</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-4 p-5 bg-emerald-500/5 rounded-2xl border border-emerald-500/10">
                            <input type="checkbox" id="venda-e-produto" class="w-7 h-7 accent-emerald-500"><label for="venda-e-produto" class="text-xs font-black text-emerald-500 uppercase italic">É Produto? (10% comissão)</label>
                        </div>
                        <button type="submit" class="w-full py-6 bg-emerald-500 text-slate-950 font-black rounded-[2rem] uppercase tracking-widest shadow-2xl shadow-emerald-500/30">Finalizar e Salvar</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-6 py-4 flex justify-around items-center z-[450] rounded-t-[3rem]">
        <button onclick="switchTab('vendas')" class="mob-btn flex flex-col items-center gap-1 text-emerald-400"><i data-lucide="plus-circle" size="28"></i></button>
        <button onclick="switchTab('dashboard')" class="mob-btn flex flex-col items-center gap-1 text-slate-500"><i data-lucide="layout-grid" size="28"></i></button>
        <button onclick="switchTab('clientes')" class="mob-btn flex flex-col items-center gap-1 text-slate-500"><i data-lucide="users" size="28"></i></button>
        <button id="mob-logout" onclick="fazerLogout()" class="hidden mob-btn text-rose-500"><i data-lucide="log-out" size="28"></i></button>
    </div>

    <script>
        lucide.createIcons();
        const _supabase = supabase.createClient("https://uijaesuqgnchafnrvnih.supabase.co", "sb_publishable_Ukmk4J2mCb_CRhdgs_qKWA_Z0c5WIgG");
        const SENHA_ADMIN = "1234";
        let DB = { vendas: [], clientes: [], estoque: [], barbeiros: [] };
        let abaDestinoPendente = "";

        const TABELA_GANHOS = {
            "corte": 20.00, "corte barba": 32.50, "corte sobrancelha": 27.50,
            "pezinho": 10.00, "barba": 15.00, "sobrancelha": 7.50,
            "alisante": 12.50, "corte sombra alisante": 35.00, "luzes": 25.00,
            "corte alisante/ pigmentado": 32.50, "corte luzes": 42.50
        };

        function calcularComissao(servico, valor, eProd) {
            if(eProd) return parseFloat(valor) * 0.10;
            const s = servico.toLowerCase().trim();
            return TABELA_GANHOS[s] !== undefined ? TABELA_GANHOS[s] : (parseFloat(valor) * 0.50);
        }

        async function carregar() {
            const { data } = await _supabase.from('barbearia').select('*').eq('id', 1).single();
            if (data) { DB = data; renderizarTudo(); }
            verificarStatusAdmin();
        }

        async function salvar() {
            await _supabase.from('barbearia').update({ vendas: DB.vendas, clientes: DB.clientes, estoque: DB.estoque, barbeiros: DB.barbeiros }).eq('id', 1);
        }

        function renderizarTudo() {
            const filtro = document.getElementById('filtro-tempo').value;
            const hoje = new Date().toISOString().split('T')[0];
            let fat = 0, com = 0, prod = 0;
            let bMap = {}; (DB.barbeiros || []).forEach(b => bMap[b.nome] = 0);

            const logCont = document.getElementById('log-vendas-horario'); logCont.innerHTML = '';
            const vFiltradas = (DB.vendas || []).filter(v => filtro === 'total' || v.data === hoje);
            
            [...vFiltradas].reverse().forEach((v, idxOriginal) => {
                const val = parseFloat(v.valor); fat += val;
                const cV = calcularComissao(v.descricao, val, v.eProduto); 
                com += cV; if(v.eProduto) prod += val;
                if(bMap[v.barbeiro] !== undefined) bMap[v.barbeiro] += cV;

                const realIdx = DB.vendas.length - 1 - idxOriginal;
                logCont.innerHTML += `
                    <div class="flex justify-between items-center p-5 bg-white/[0.03] rounded-[1.5rem] border border-white/5">
                        <div class="flex items-center gap-4">
                            <span class="text-emerald-400 font-black text-xs">${v.hora || '--:--'}</span>
                            <div><p class="text-white font-black text-xs uppercase italic">${v.cliente}</p>
                            <p class="text-slate-500 font-bold text-[8px] uppercase">${v.descricao} | ${v.barbeiro}</p></div>
                        </div>
                        <div class="flex items-center gap-4 text-right">
                            <div><p class="font-black text-white text-xs">R$ ${val.toFixed(2)}</p><p class="text-[9px] text-sky-500 font-black">Ganho: R$ ${cV.toFixed(2)}</p></div>
                            <button onclick="abrirEditor('venda', ${realIdx})" class="p-2 text-slate-600 hover:text-emerald-400"><i data-lucide="edit-3" size="16"></i></button>
                        </div>
                    </div>`;
            });

            document.getElementById('dash-faturamento').innerText = "R$ " + fat.toFixed(2);
            document.getElementById('dash-comissoes').innerText = "R$ " + com.toFixed(2);
            document.getElementById('dash-produtos').innerText = "R$ " + prod.toFixed(2);

            const bCont = document.getElementById('lista-barbeiros-comissao'); bCont.innerHTML = '';
            Object.entries(bMap).forEach(([n, v]) => {
                bCont.innerHTML += `<div class="glass p-5 rounded-2xl flex justify-between font-bold text-xs"><span>${n}</span><span class="text-emerald-400">R$ ${v.toFixed(2)}</span></div>`;
            });

            document.getElementById('venda-barbeiro').innerHTML = '<option value="">Barbeiro...</option>' + DB.barbeiros.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('venda-cliente').innerHTML = '<option value="Consumidor">Cliente...</option>' + DB.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('lista-itens-datalist').innerHTML = DB.estoque.map(i => `<option value="${i.nome}">`).join('');

            renderizarListas(); renderizarEquipe(); lucide.createIcons();
        }

        function renderizarListas() {
            const cliL = document.getElementById('lista-completa-clientes'); cliL.innerHTML = '';
            DB.clientes.forEach(c => cliL.innerHTML += `
                <div class="glass p-6 rounded-[2.5rem] border-white/5 flex flex-col gap-5">
                    <div class="flex justify-between">
                        <div><h4 class="font-black text-white text-xl uppercase italic tracking-tighter">${c.nome}</h4><p class="text-[10px] text-slate-500 font-bold uppercase">${c.celular || 'S/ Whats'}</p></div>
                        <button onclick="abrirEditor('cliente', ${c.id})" class="p-2 text-slate-600 hover:text-emerald-400"><i data-lucide="edit-3" size="20"></i></button>
                    </div>
                    <a href="https://wa.me/55${c.celular?.replace(/\D/g,'')}" target="_blank" class="btn-whatsapp w-full py-4 rounded-2xl flex items-center justify-center gap-3 font-black text-xs uppercase"><i data-lucide="message-circle" size="18"></i> Chamar no Zap</a>
                </div>`);

            const estL = document.getElementById('lista-estoque'); estL.innerHTML = '';
            DB.estoque.forEach(i => estL.innerHTML += `
                <div class="glass p-6 rounded-[2.5rem] flex justify-between items-center">
                    <div><p class="font-black text-white text-lg uppercase tracking-tighter">${i.nome}</p><p class="text-[10px] text-slate-500 font-bold uppercase">${i.tipo}</p></div>
                    <div class="flex items-center gap-6"><span class="font-black text-xl italic">R$ ${parseFloat(i.preco).toFixed(2)}</span>
                    <button onclick="abrirEditor('produto', ${i.id})" class="text-slate-600 hover:text-purple-400"><i data-lucide="edit-3" size="20"></i></button></div>
                </div>`);
        }

        function renderizarEquipe() {
            const listE = document.getElementById('lista-equipe'); listE.innerHTML = '';
            DB.barbeiros.forEach((b, idx) => listE.innerHTML += `<div class="p-5 bg-white/[0.03] rounded-2xl flex justify-between items-center border border-white/5"><span class="font-black text-lg uppercase italic">${b.nome}</span><button onclick="abrirEditor('barbeiro', ${idx})" class="p-2 text-slate-500 hover:text-emerald-400"><i data-lucide="edit-3" size="20"></i></button></div>`);
        }

        function abrirEditor(tipo, idIdx = null) {
            const c = document.getElementById('editor-campos'); const t = document.getElementById('editor-titulo');
            const btnDel = document.getElementById('btn-excluir-item');
            c.innerHTML = ''; document.getElementById('modal-editor').style.display = 'flex'; btnDel.style.display = 'block';

            if (tipo === 'venda') {
                const v = DB.vendas[idIdx]; t.innerText = "Editar Venda";
                c.innerHTML = `<input type="number" id="ed-v-v" value="${v.valor}" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-black"><select id="ed-v-b" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold">${DB.barbeiros.map(b => `<option ${b.nome==v.barbeiro?'selected':''}>${b.nome}</option>`).join('')}</select>`;
                document.getElementById('btn-salvar-editor').onclick = async () => { DB.vendas[idIdx].valor = document.getElementById('ed-v-v').value; DB.vendas[idIdx].barbeiro = document.getElementById('ed-v-b').value; fecharModais(); await salvar(); carregar(); };
                btnDel.onclick = async () => { if(confirm("Apagar esta venda?")) { DB.vendas.splice(idIdx, 1); fecharModais(); await salvar(); carregar(); } };
            } else if (tipo === 'cliente' || tipo === 'novo_cliente') {
                const cli = tipo.includes('novo') ? {nome:'',celular:''} : DB.clientes.find(x => x.id == idIdx); t.innerText = "Cliente";
                if(tipo.includes('novo')) btnDel.style.display = 'none';
                c.innerHTML = `<input id="ed-c-n" value="${cli.nome}" placeholder="Nome" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold"><input id="ed-c-w" value="${cli.celular}" placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white">`;
                document.getElementById('btn-salvar-editor').onclick = async () => { const n=document.getElementById('ed-c-n').value, w=document.getElementById('ed-c-w').value; if(tipo.includes('novo')) DB.clientes.push({id:Date.now(),nome:n,celular:w,dataUltimo:new Date().toISOString()}); else { const i=DB.clientes.findIndex(x=>x.id==idIdx); DB.clientes[i].nome=n; DB.clientes[i].celular=w; } fecharModais(); await salvar(); carregar(); };
                btnDel.onclick = async () => { if(confirm("Deletar cliente?")) { DB.clientes = DB.clientes.filter(x => x.id != idIdx); fecharModais(); await salvar(); carregar(); } };
            } else if (tipo === 'produto' || tipo === 'novo_produto') {
                const p = tipo.includes('novo') ? {nome:'',preco:'',tipo:'Serviço'} : DB.estoque.find(x => x.id == idIdx); t.innerText = "Estoque";
                if(tipo.includes('novo')) btnDel.style.display = 'none';
                c.innerHTML = `<input id="ed-p-n" value="${p.nome}" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold"><input type="number" id="ed-p-v" value="${p.preco}" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-black">`;
                document.getElementById('btn-salvar-editor').onclick = async () => { const i=DB.estoque.findIndex(x=>x.id==idIdx); if(tipo.includes('novo')) DB.estoque.push({id:Date.now(),nome:document.getElementById('ed-p-n').value,preco:document.getElementById('ed-p-v').value,tipo:p.tipo}); else { DB.estoque[i].nome=document.getElementById('ed-p-n').value; DB.estoque[i].preco=document.getElementById('ed-p-v').value; } fecharModais(); await salvar(); carregar(); };
                btnDel.onclick = async () => { if(confirm("Remover item?")) { DB.estoque = DB.estoque.filter(x => x.id != idIdx); fecharModais(); await salvar(); carregar(); } };
            } else if (tipo === 'barbeiro' || tipo === 'novo_barbeiro') {
                const b = tipo.includes('novo') ? {nome:''} : DB.barbeiros[idIdx]; t.innerText = "Barbeiro";
                if(tipo.includes('novo')) btnDel.style.display = 'none';
                c.innerHTML = `<input id="ed-b-n" value="${b.nome}" placeholder="Nome" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-black">`;
                document.getElementById('btn-salvar-editor').onclick = async () => { if(tipo.includes('novo')) DB.barbeiros.push({nome:document.getElementById('ed-b-n').value}); else DB.barbeiros[idIdx].nome=document.getElementById('ed-b-n').value; fecharModais(); await salvar(); carregar(); };
                btnDel.onclick = async () => { if(confirm("Excluir barbeiro?")) { DB.barbeiros.splice(idIdx, 1); fecharModais(); await salvar(); carregar(); } };
            }
            lucide.createIcons();
        }

        function switchTab(t) {
            if(['dashboard', 'estoque', 'config', 'clientes'].includes(t)) {
                if(sessionStorage.getItem('is_admin') === 'true') { executarTrocaTab(t); } 
                else { abaDestinoPendente = t; document.getElementById('modal-senha').style.display = 'flex'; }
            } else { executarTrocaTab(t); }
        }

        function executarTrocaTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            const bD = document.getElementById('btn-' + t); if(bD) bD.classList.add('active-tab');
            fecharModais();
        }

        function confirmarSenhaAdmin() {
            if(document.getElementById('input-senha-admin').value === SENHA_ADMIN) {
                sessionStorage.setItem('is_admin', 'true'); 
                verificarStatusAdmin();
                executarTrocaTab(abaDestinoPendente);
            } else alert("Senha incorreta!");
        }

        function verificarStatusAdmin() {
            const status = sessionStorage.getItem('is_admin') === 'true';
            document.getElementById('logout-btn').classList.toggle('hidden', !status);
            document.getElementById('mob-logout').classList.toggle('hidden', !status);
        }

        function fazerLogout() {
            sessionStorage.removeItem('is_admin');
            verificarStatusAdmin();
            switchTab('vendas');
        }

        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        document.getElementById('form-venda').addEventListener('submit', async function(e) {
            e.preventDefault(); const agora = new Date();
            DB.vendas.push({ 
                barbeiro: document.getElementById('venda-barbeiro').value, cliente: document.getElementById('venda-cliente').value, 
                descricao: document.getElementById('venda-descricao').value, valor: document.getElementById('venda-valor').value, 
                pagamento: document.getElementById('venda-pagamento').value, eProduto: document.getElementById('venda-e-produto').checked, 
                data: agora.toISOString().split('T')[0], hora: agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0')
            });
            await salvar(); this.reset(); alert("Lançado com sucesso!"); carregar();
        });

        function atualizarPrecoAutomatico() {
            const item = DB.estoque.find(i => i.nome === document.getElementById('venda-descricao').value);
            if(item) { document.getElementById('venda-valor').value = item.preco; document.getElementById('venda-e-produto').checked = (item.tipo === "Produto"); }
        }

        carregar();
    </script>
</body>
</html>
