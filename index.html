<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isael Alves Cortes - Gestão Premium</title>
    <link rel="icon" type="image/png" href="Logo.png" />
    <link rel="apple-touch-icon" href="Logo.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; padding-bottom: 100px; background: #000000; color: #cbd5e1; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-tab { background: #ffffff !important; color: #000000 !important; font-weight: 900; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(12px); padding: 20px; }
        #modal-bloqueio-total { display: flex; z-index: 999; } 
        .brand-logo { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); margin: 0 auto 2rem auto; display: block; }
        @media (max-width: 1024px) { .brand-logo { width: 90px; height: 90px; margin-bottom: 1rem; } }
        @media (min-width: 1024px) { body { padding-bottom: 0; } }
    </style>
</head>
<body class="min-h-screen">

    <div id="modal-bloqueio-total" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-xs text-center border-white/20">
            <img src="Logo.png" alt="Logo" class="w-20 h-20 mx-auto mb-6 rounded-full border border-white/10">
            <h3 class="text-xl font-black text-white mb-2 italic uppercase">Acesso Restrito</h3>
            <p class="text-[10px] text-slate-500 mb-6 uppercase font-bold">Digite a senha para entrar</p>
            <input type="password" id="input-senha-entrada" placeholder="••••" class="w-full bg-black border border-white/10 rounded-2xl p-4 text-white text-center text-2xl mb-6 outline-none">
            <button onclick="verificarSenhaEntrada()" class="w-full py-4 bg-white text-black rounded-xl font-black uppercase text-xs">Acessar</button>
        </div>
    </div>

    <div id="modal-senha" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-xs text-center">
            <h3 class="text-xl font-black text-white mb-4 italic uppercase">Área do Dono</h3>
            <input type="password" id="input-senha-admin" placeholder="••••" class="w-full bg-black border border-white/10 rounded-2xl p-4 text-white text-center text-2xl mb-6 outline-none">
            <div class="flex gap-3">
                <button onclick="fecharModais()" class="flex-1 py-3 text-slate-500 font-bold text-xs uppercase">Sair</button>
                <button onclick="confirmarSenhaAdmin()" class="flex-1 py-3 bg-white text-black rounded-xl font-black uppercase text-xs">Liberar</button>
            </div>
        </div>
    </div>

    <div id="modal-editor" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-md border-white/10">
            <h3 id="editor-titulo" class="text-2xl font-black text-white mb-6 text-center italic uppercase">Editor</h3>
            <div id="seletor-tipo" class="flex gap-2 mb-6" style="display: none;">
                <button onclick="setTipoNovoItem('Serviço')" id="tipo-servico" class="flex-1 py-3 rounded-xl border border-white/10 text-[10px] font-black uppercase">Serviço</button>
                <button onclick="setTipoNovoItem('Produto')" id="tipo-produto" class="flex-1 py-3 rounded-xl border border-white/10 text-[10px] font-black uppercase">Produto</button>
            </div>
            <div id="editor-campos" class="space-y-4"></div>
            <div class="flex flex-col gap-3 mt-10">
                <div class="flex gap-3">
                    <button onclick="fecharModais()" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold text-xs text-slate-500 uppercase">Cancelar</button>
                    <button id="btn-salvar-editor" class="flex-1 py-4 bg-white text-black rounded-2xl font-black uppercase text-xs">Salvar</button>
                </div>
                <button id="btn-excluir-item" class="w-full py-3 text-rose-600 font-bold text-[10px] uppercase border border-rose-600/20 rounded-xl">Remover</button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-black border-r border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen z-50">
            <img src="Logo.png" alt="Logo" class="brand-logo">
            <nav class="space-y-3 flex-1">
                <button onclick="switchTab('vendas')" id="btn-vendas" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black active-tab"><i data-lucide="plus-square"></i> NOVO</button>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="bar-chart-3"></i> PAINEL</button>
                <button onclick="switchTab('clientes')" id="btn-clientes" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="users"></i> CLIENTES</button>
                <button onclick="switchTab('estoque')" id="btn-estoque" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="package"></i> ESTOQUE</button>
                <button onclick="switchTab('config')" id="btn-config" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="settings"></i> EQUIPE</button>
            </nav>
            <button onclick="logoutAdmin()" class="mt-auto flex items-center gap-4 px-6 py-4 text-rose-500 font-black text-[10px] uppercase italic"><i data-lucide="log-out"></i> SAIR ADMIN</button>
        </aside>

        <main class="flex-1 p-4 lg:p-16">
            <div id="tab-vendas" class="tab-content">
                <div class="max-w-xl mx-auto glass p-8 lg:p-14 rounded-[3rem]">
                    <div class="lg:hidden mb-6 flex justify-between items-start">
                        <img src="Logo.png" alt="Logo" class="brand-logo !m-0">
                        <button onclick="logoutAdmin()" class="text-rose-500 p-2"><i data-lucide="log-out"></i></button>
                    </div>
                    <h3 class="text-2xl font-black text-white mb-8 text-center uppercase italic">Novo Lançamento</h3>
                    <form id="form-venda" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <select id="venda-barbeiro" class="bg-black border border-white/10 p-4 rounded-2xl text-white outline-none font-bold" required></select>
                            <select id="venda-cliente" class="bg-black border border-white/10 p-4 rounded-2xl text-white outline-none italic"></select>
                        </div>
                        <div class="flex flex-col md:flex-row gap-2">
                            <input type="text" id="venda-descricao" list="lista-itens-datalist" oninput="atualizarPrecoAutomatico()" placeholder="Item ou Serviço..." class="flex-1 bg-black border border-white/10 p-4 rounded-2xl text-white outline-none font-bold">
                            <div class="flex gap-2">
                                <input type="number" id="venda-qtd" value="1" min="1" class="w-20 bg-black border border-white/10 p-4 rounded-2xl text-white text-center font-bold outline-none">
                                <button type="button" onclick="adicionarItemAoCarrinho()" class="bg-white text-black px-6 py-4 rounded-2xl font-black text-xl">+</button>
                            </div>
                        </div>
                        <datalist id="lista-itens-datalist"></datalist>
                        <div id="carrinho-venda" class="space-y-2 hidden border-y border-white/5 py-4"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="venda-valor" placeholder="R$ Total" step="0.01" class="bg-black border border-white/10 p-4 rounded-2xl text-white outline-none font-black" required>
                            <select id="venda-pagamento" class="bg-black border border-white/10 p-4 rounded-2xl text-white outline-none font-bold" required>
                                <option value="">Pagamento...</option><option value="Pix">Pix</option><option value="Cartão">Cartão</option><option value="Dinheiro">Dinheiro</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full py-5 bg-white text-black font-black rounded-2xl uppercase shadow-xl">Finalizar</button>
                    </form>
                </div>
            </div>

            <div id="tab-dashboard" class="tab-content hidden">
                <header class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                    <h2 class="text-2xl font-black text-white uppercase italic">Painel</h2>
                    <div class="flex gap-2">
                        <input type="date" id="filtro-data" onchange="renderizarTudo()" class="bg-white text-black text-[10px] font-black rounded-xl px-4 py-2 uppercase italic outline-none">
                        <select id="filtro-tempo" onchange="renderizarTudo()" class="bg-white text-black text-[10px] font-black rounded-xl px-4 py-2 uppercase italic">
                            <option value="dia">Hoje/Data</option><option value="total">Geral</option>
                        </select>
                    </div>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 text-center">
                    <div class="glass p-6 rounded-3xl"><p class="text-[9px] text-slate-500 uppercase">Faturamento</p><h4 id="dash-faturamento" class="text-2xl font-black text-white italic">R$ 0,00</h4></div>
                    <div class="glass p-6 rounded-3xl"><p class="text-[9px] text-slate-500 uppercase">Comissões</p><h4 id="dash-comissoes" class="text-2xl font-black text-white italic">R$ 0,00</h4></div>
                    <div class="glass p-6 rounded-3xl"><p class="text-[9px] text-slate-500 uppercase">Lançamentos</p><h4 id="dash-lancamentos" class="text-2xl font-black text-white italic">0</h4></div>
                </div>
                <div id="log-vendas-agrupado" class="space-y-8"></div>
            </div>

            <div id="tab-clientes" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8"><h3 class="text-2xl font-black text-white uppercase italic">Clientes</h3><button onclick="abrirEditor('novo_cliente')" class="bg-white text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase">NOVO +</button></div>
                <div id="lista-completa-clientes" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>
            <div id="tab-estoque" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8"><h3 class="text-2xl font-black text-white uppercase italic">Estoque</h3><button onclick="abrirEditor('novo_produto')" class="bg-white text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase">NOVO +</button></div>
                <div class="mb-2"><span class="text-[10px] font-black uppercase text-slate-500 italic">Serviços</span></div>
                <div id="lista-servicos" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"></div>
                <div class="mb-2"><span class="text-[10px] font-black uppercase text-slate-500 italic">Produtos & Materiais</span></div>
                <div id="lista-produtos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div id="tab-config" class="tab-content hidden">
                <h3 class="text-2xl font-black text-white mb-8 text-center uppercase italic">Equipe</h3>
                <div id="lista-equipe" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8"></div>
                <button onclick="abrirEditor('novo_barbeiro')" class="w-full max-w-md mx-auto block py-4 border border-white/10 rounded-xl font-black text-[10px] text-white uppercase italic">ADICIONAR BARBEIRO</button>
            </div>
        </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/5 px-2 py-3 flex justify-around items-center z-[450] rounded-t-[2rem]">
        <button onclick="switchTab('vendas')" id="mob-vendas" class="mob-btn text-white p-2"><i data-lucide="plus-circle"></i></button>
        <button onclick="switchTab('dashboard')" id="mob-dashboard" class="mob-btn text-slate-600 p-2"><i data-lucide="layout-grid"></i></button>
        <button onclick="switchTab('clientes')" id="mob-clientes" class="mob-btn text-slate-600 p-2"><i data-lucide="users"></i></button>
        <button onclick="switchTab('estoque')" id="mob-estoque" class="mob-btn text-slate-600 p-2"><i data-lucide="package"></i></button>
        <button onclick="switchTab('config')" id="mob-config" class="mob-btn text-slate-600 p-2"><i data-lucide="settings"></i></button>
    </div>

    <script>
        lucide.createIcons();
        const _supabase = supabase.createClient("https://uijaesuqgnchafnrvnih.supabase.co", "sb_publishable_Ukmk4J2mCb_CRhdgs_qKWA_Z0c5WIgG");
        const SENHA_ADMIN = "81120824";
        let DB = { vendas: [], clientes: [], estoque: [], barbeiros: [] };
        let carrinhoTemporario = [];
        let tipoItemSelecionado = 'Serviço';
        document.getElementById('filtro-data').value = new Date().toISOString().split('T')[0];

        function verificarSenhaEntrada() {
            if(document.getElementById('input-senha-entrada').value === SENHA_ADMIN) {
                document.getElementById('modal-bloqueio-total').style.display = 'none';
                sessionStorage.setItem('acesso_concedido', 'true');
            } else { alert("Senha Incorreta!"); }
        }
        if(sessionStorage.getItem('acesso_concedido') === 'true') {
            document.getElementById('modal-bloqueio-total').style.display = 'none';
        }

        function logoutAdmin() {
            sessionStorage.removeItem('is_admin');
            executarTrocaTab('vendas');
            alert("Sessão Admin Encerrada.");
        }

        const TABELA_GANHOS = {
            "corte": 20.00, "corte barba": 32.50, "corte + barba": 32.50, "corte sobrancelha": 27.50, "corte + sobrancelha": 27.50,
            "pezinho": 10.00, "barba": 15.00, "sobrancelha": 7.50, "alisante": 12.50, "corte sombra alisante": 35.00, "corte + sombra + alisante": 35.00,
            "luzes": 25.00, "corte alisante/ pigmentado": 32.50, "corte + alisante/ pigmentado": 32.50, "corte luzes": 42.50, "corte + luzes": 42.50
        };

        function calcularComissao(descricao) {
            let total = 0;
            const partes = descricao.split(',');
            partes.forEach(p => {
                let nome = p.trim().toLowerCase();
                let mult = 1;
                if (nome.includes('x ')) { const aux = nome.split('x '); mult = parseInt(aux[0]) || 1; nome = aux[1].trim(); }
                if (TABELA_GANHOS[nome] !== undefined) total += (TABELA_GANHOS[nome] * mult);
            });
            return total;
        }

        async function carregar() {
            const { data } = await _supabase.from('barbearia').select('*').eq('id', 1).single();
            if (data) { DB = data; renderizarTudo(); }
        }

        async function salvar() {
            await _supabase.from('barbearia').update({ vendas: DB.vendas, clientes: DB.clientes, estoque: DB.estoque, barbeiros: DB.barbeiros }).eq('id', 1);
        }

        function renderizarTudo() {
            const filtroT = document.getElementById('filtro-tempo').value;
            const dataS = document.getElementById('filtro-data').value;
            const logA = document.getElementById('log-vendas-agrupado');
            logA.innerHTML = '';
            let fatG = 0, comG = 0;
            const vFiltradas = (DB.vendas || []).filter(v => filtroT === 'total' || v.data === dataS);

            (DB.barbeiros || []).forEach(barb => {
                const vB = vFiltradas.filter(v => v.barbeiro === barb.nome);
                if(vB.length === 0) return;
                let fatB = 0, comB = 0;
                let htmlV = '';
                let contagem = {};
                ["corte", "corte barba", "corte sobrancelha", "pezinho", "barba", "sobrancelha", "alisante", "corte sombra alisante", "luzes", "corte alisante/ pigmentado", "corte luzes"].forEach(k => contagem[k] = 0);
                contagem["outros"] = 0;

                vB.forEach(v => {
                    const idxV = DB.vendas.indexOf(v);
                    const val = parseFloat(v.valor); fatB += val;
                    const cV = calcularComissao(v.descricao); comB += cV;
                    v.descricao.split(',').forEach(item => {
                        let nome = item.trim().toLowerCase();
                        let qtd = 1;
                        if(nome.includes('x ')) { const p = nome.split('x '); qtd = parseInt(p[0]) || 1; nome = p[1].trim(); }
                        let nomeLimpo = nome.replace(/\+/g, '').replace(/\s\s+/g, ' ').trim();
                        if(contagem[nomeLimpo] !== undefined) contagem[nomeLimpo] += qtd; else contagem["outros"] += qtd;
                    });
                    htmlV += `<div class="flex justify-between items-center p-4 bg-white/[0.02] border-b border-white/5 last:border-0">
                        <div class="text-[10px] italic"><span class="text-white font-black uppercase">${v.cliente}</span> <span class="text-slate-500 text-[8px]">${v.hora || ''}</span><p class="text-slate-500">${v.descricao}</p></div>
                        <div class="flex items-center gap-3"><div class="text-right"><p class="font-black text-white text-xs italic">R$ ${val.toFixed(2)}</p><p class="text-emerald-500 text-[8px] font-black italic">Com: R$ ${cV.toFixed(2)}</p></div>
                        <button onclick="abrirEditor('venda', ${idxV})" class="text-slate-700"><i data-lucide="edit-3" size="14"></i></button></div>
                    </div>`;
                });

                fatG += fatB; comG += comB;
                logA.innerHTML += `<div class="glass overflow-hidden rounded-[2rem]">
                    <div class="bg-white/5 p-5 flex justify-between items-end border-b border-white/10">
                        <div><h4 class="text-white font-black italic uppercase text-lg">${barb.nome}</h4><div class="grid grid-cols-2 gap-x-4 gap-y-1 mt-2">${Object.entries(contagem).map(([k, v]) => v > 0 ? `<p class="text-[8px] text-slate-400 uppercase font-bold">${v} ${k}</p>` : '').join('')}</div></div>
                        <div class="flex gap-4"><div class="text-right"><p class="text-[8px] text-slate-500 font-bold uppercase">Comissão</p><p class="text-emerald-500 font-black italic text-xl">R$ ${comB.toFixed(2)}</p></div>
                        <div class="text-right border-l border-white/10 pl-4"><p class="text-[8px] text-slate-500 font-bold uppercase">Casa</p><p class="text-white font-black italic text-xl">R$ ${(fatB - comB).toFixed(2)}</p></div></div>
                    </div><div>${htmlV}</div></div>`;
            });

            document.getElementById('dash-faturamento').innerText = "R$ " + fatG.toFixed(2);
            document.getElementById('dash-comissoes').innerText = "R$ " + comG.toFixed(2);
            document.getElementById('dash-lancamentos').innerText = vFiltradas.length;
            document.getElementById('venda-barbeiro').innerHTML = '<option value="">Barbeiro...</option>' + DB.barbeiros.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('venda-cliente').innerHTML = '<option value="Consumidor">Cliente...</option>' + DB.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('lista-itens-datalist').innerHTML = DB.estoque.map(i => `<option value="${i.nome}">`).join('');
            renderizarListasSecundarias(); lucide.createIcons();
        }

        function renderizarListasSecundarias() {
            const cliL = document.getElementById('lista-completa-clientes'); if(cliL) {
                cliL.innerHTML = ''; DB.clientes.forEach(c => {
                    const btnWhats = c.whatsapp ? `<a href="https://wa.me/55${c.whatsapp.replace(/\D/g,'')}" target="_blank" class="text-emerald-500"><i data-lucide="message-circle" size="16"></i></a>` : '';
                    const btnInsta = c.instagram ? `<a href="https://instagram.com/${c.instagram.replace('@','')}" target="_blank" class="text-rose-400"><i data-lucide="instagram" size="16"></i></a>` : '';
                    cliL.innerHTML += `<div class="glass p-5 rounded-3xl flex justify-between items-center"><div><p class="font-black text-white text-xs uppercase italic">${c.nome}</p></div><div class="flex gap-4 items-center">${btnWhats}${btnInsta}<button onclick="abrirEditor('cliente', ${c.id})" class="text-slate-600 ml-2"><i data-lucide="edit-3" size="16"></i></button></div></div>`;
                });
            }
            const servL = document.getElementById('lista-servicos'); if(servL) {
                servL.innerHTML = ''; DB.estoque.filter(i => i.tipo === 'Serviço').forEach(i => servL.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between"><div><p class="text-[10px] font-black uppercase italic">${i.nome}</p><p class="text-white font-bold text-xs">R$ ${parseFloat(i.preco).toFixed(2)}</p></div><button onclick="abrirEditor('produto', ${i.id})" class="text-slate-600"><i data-lucide="edit-3" size="16"></i></button></div>`);
            }
            const prodL = document.getElementById('lista-produtos'); if(prodL) {
                prodL.innerHTML = ''; DB.estoque.filter(i => i.tipo === 'Produto').forEach(i => {
                    const corQtd = (i.quantidade || 0) <= 3 ? 'text-rose-500' : 'text-emerald-500';
                    prodL.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center"><div><p class="text-[10px] font-black uppercase italic">${i.nome}</p><p class="text-white font-bold text-xs">R$ ${parseFloat(i.preco).toFixed(2)}</p></div><div class="flex items-center gap-4"><div class="text-right leading-none"><p class="text-[8px] text-slate-500 font-bold uppercase">Qtd</p><p class="${corQtd} font-black text-sm">${i.quantidade || 0}</p></div><button onclick="abrirEditor('produto', ${i.id})" class="text-slate-600"><i data-lucide="edit-3" size="16"></i></button></div></div>`;
                });
            }
            const equL = document.getElementById('lista-equipe'); if(equL) {
                equL.innerHTML = ''; DB.barbeiros.forEach((b, idx) => equL.innerHTML += `<div class="glass p-5 rounded-3xl flex justify-between items-center"><div><p class="font-black text-white text-xs uppercase italic">${b.nome}</p></div><button onclick="abrirEditor('barbeiro', ${idx})" class="text-slate-600"><i data-lucide="edit-3" size="16"></i></button></div>`);
            }
        }

        function adicionarItemAoCarrinho() {
            const d = document.getElementById('venda-descricao'); const q = document.getElementById('venda-qtd'); const v = document.getElementById('venda-valor');
            if(!d.value) return; const qtd = parseInt(q.value) || 1; const precoUnit = parseFloat(v.value) || 0;
            const nomeExib = qtd > 1 ? `${qtd}x ${d.value}` : d.value;
            carrinhoTemporario.push({ nome: nomeExib, preco: precoUnit * qtd, original: d.value, qtd: qtd });
            d.value = ''; q.value = '1'; atualizarVisualCarrinho();
        }

        function atualizarVisualCarrinho() {
            const cont = document.getElementById('carrinho-venda'); const t = document.getElementById('venda-valor');
            if(carrinhoTemporario.length === 0) { cont.classList.add('hidden'); t.value = ''; return; }
            cont.classList.remove('hidden'); let total = 0;
            cont.innerHTML = carrinhoTemporario.map((item, idx) => { total += item.preco; return `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl italic text-[10px]"><span>${item.nome}</span><button type="button" onclick="removerItemCarrinho(${idx})" class="text-rose-500"><i data-lucide="x" size="14"></i></button></div>`; }).join('');
            t.value = total.toFixed(2); lucide.createIcons();
        }

        function removerItemCarrinho(idx) { carrinhoTemporario.splice(idx, 1); atualizarVisualCarrinho(); }

        document.getElementById('form-venda').addEventListener('submit', async function(e) {
            e.preventDefault(); if(carrinhoTemporario.length === 0 && document.getElementById('venda-descricao').value) adicionarItemAoCarrinho();
            if(carrinhoTemporario.length === 0) return; const agora = new Date();
            carrinhoTemporario.forEach(item => { const idx = DB.estoque.findIndex(e => e.nome.toLowerCase() === item.original.toLowerCase()); if(idx !== -1 && DB.estoque[idx].tipo === 'Produto') DB.estoque[idx].quantidade = (DB.estoque[idx].quantidade || 0) - item.qtd; });
            DB.vendas.push({ barbeiro: document.getElementById('venda-barbeiro').value, cliente: document.getElementById('venda-cliente').value, descricao: carrinhoTemporario.map(i => i.nome).join(', '), valor: document.getElementById('venda-valor').value, pagamento: document.getElementById('venda-pagamento').value, data: agora.toISOString().split('T')[0], hora: agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0') });
            await salvar(); this.reset(); carrinhoTemporario = []; atualizarVisualCarrinho(); renderizarTudo();
        });

        let abaDestinoPendente = 'vendas';
        function switchTab(t) {
            if(['dashboard', 'estoque', 'config', 'clientes'].includes(t)) {
                if(sessionStorage.getItem('is_admin') === 'true') executarTrocaTab(t);
                else { abaDestinoPendente = t; document.getElementById('modal-senha').style.display = 'flex'; }
            } else executarTrocaTab(t);
        }
        function executarTrocaTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn, .mob-btn').forEach(b => { b.classList.remove('active-tab'); if(b.id === 'btn-'+t || b.id === 'mob-'+t) b.classList.add('active-tab'); });
            fecharModais();
        }
        function confirmarSenhaAdmin() { if(document.getElementById('input-senha-admin').value === SENHA_ADMIN) { sessionStorage.setItem('is_admin', 'true'); executarTrocaTab(abaDestinoPendente); } else alert("Senha Incorreta!"); }
        function fecharModais() { document.querySelectorAll('.modal').forEach(m => { if(m.id !== 'modal-bloqueio-total') m.style.display = 'none'; }); }
        function setTipoNovoItem(t) { tipoItemSelecionado = t; document.getElementById('tipo-servico').classList.toggle('active-tab', t === 'Serviço'); document.getElementById('tipo-produto').classList.toggle('active-tab', t === 'Produto'); const q = document.getElementById('campo-qtd-editor'); if(q) q.style.display = t === 'Produto' ? 'block' : 'none'; }

        function abrirEditor(tipo, idIdx = null) {
            const c = document.getElementById('editor-campos'); const t = document.getElementById('editor-titulo');
            const btnDel = document.getElementById('btn-excluir-item'); const btnSalvar = document.getElementById('btn-salvar-editor');
            const seletor = document.getElementById('seletor-tipo');
            c.innerHTML = ''; document.getElementById('modal-editor').style.display = 'flex'; btnDel.style.display = 'block'; seletor.style.display = 'none';
            if (tipo === 'venda') {
                const v = DB.vendas[idIdx]; t.innerText = "EDITAR LANÇAMENTO";
                c.innerHTML = `<input type="number" id="ed-v-v" value="${v.valor}" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-black italic outline-none">`;
                btnSalvar.onclick = async () => { DB.vendas[idIdx].valor = document.getElementById('ed-v-v').value; fecharModais(); await salvar(); renderizarTudo(); };
                btnDel.onclick = async () => { if(confirm("Excluir?")) { DB.vendas.splice(idIdx, 1); fecharModais(); await salvar(); renderizarTudo(); } };
            }
            else if (tipo === 'cliente' || tipo === 'novo_cliente') {
                const isNovo = idIdx === null; const cli = isNovo ? {nome:'', whatsapp:'', instagram:''} : DB.clientes.find(x => x.id == idIdx);
                t.innerText = "CLIENTE";
                c.innerHTML = `<input id="ed-c-n" value="${cli.nome}" placeholder="Nome" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-bold italic outline-none"><input id="ed-c-w" value="${cli.whatsapp || ''}" placeholder="WhatsApp" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-bold italic outline-none"><input id="ed-c-i" value="${cli.instagram || ''}" placeholder="Instagram" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-bold italic outline-none">`;
                btnSalvar.onclick = async () => { const d = {id: isNovo ? Date.now() : cli.id, nome: document.getElementById('ed-c-n').value, whatsapp: document.getElementById('ed-c-w').value, instagram: document.getElementById('ed-c-i').value}; if(isNovo) DB.clientes.push(d); else DB.clientes[DB.clientes.findIndex(x=>x.id==idIdx)] = d; fecharModais(); await salvar(); renderizarTudo(); };
                btnDel.onclick = async () => { if(confirm("Remover?")) { DB.clientes = DB.clientes.filter(x => x.id != idIdx); fecharModais(); await salvar(); renderizarTudo(); } };
            }
            else if (tipo === 'produto' || tipo === 'novo_produto') {
                seletor.style.display = 'flex'; const isNovo = idIdx === null; const p = isNovo ? {nome:'',preco:'',tipo:'Serviço', quantidade: 0} : DB.estoque.find(x => x.id == idIdx);
                t.innerText = "ITEM ESTOQUE"; if(isNovo) { btnDel.style.display = 'none'; setTipoNovoItem('Serviço'); } else setTipoNovoItem(p.tipo);
                c.innerHTML = `<input id="ed-p-n" value="${p.nome}" placeholder="Nome" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-black italic outline-none"><input type="number" id="ed-p-v" value="${p.preco}" placeholder="Preço" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-black italic outline-none"><div id="campo-qtd-editor" style="display: ${p.tipo === 'Produto' ? 'block' : 'none'}"><p class="text-[8px] text-slate-500 uppercase font-black ml-2 mb-1">Qtd em Estoque</p><input type="number" id="ed-p-q" value="${p.quantidade || 0}" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-black italic outline-none"></div>`;
                btnSalvar.onclick = async () => { const d = {id:isNovo ? Date.now() : idIdx, nome:document.getElementById('ed-p-n').value, preco:document.getElementById('ed-p-v').value, tipo:tipoItemSelecionado, quantidade: parseInt(document.getElementById('ed-p-q').value) || 0}; if(isNovo) DB.estoque.push(d); else DB.estoque[DB.estoque.findIndex(x=>x.id==idIdx)] = d; fecharModais(); await salvar(); renderizarTudo(); };
                btnDel.onclick = async () => { if(confirm("Remover?")) { DB.estoque = DB.estoque.filter(x => x.id != idIdx); fecharModais(); await salvar(); renderizarTudo(); } };
            }
            else if (tipo === 'barbeiro' || tipo === 'novo_barbeiro') {
                const isNovo = idIdx === null; const b = isNovo ? {nome:''} : DB.barbeiros[idIdx];
                t.innerText = "BARBEIRO"; if(isNovo) btnDel.style.display = 'none';
                c.innerHTML = `<input id="ed-b-n" value="${b.nome}" placeholder="Nome do Barbeiro" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-black italic outline-none">`;
                btnSalvar.onclick = async () => { if(isNovo) DB.barbeiros.push({nome:document.getElementById('ed-b-n').value}); else DB.barbeiros[idIdx].nome=document.getElementById('ed-b-n').value; fecharModais(); await salvar(); renderizarTudo(); };
                btnDel.onclick = async () => { if(confirm("Excluir?")) { DB.barbeiros.splice(idIdx, 1); fecharModais(); await salvar(); renderizarTudo(); } };
            }
        }
        function atualizarPrecoAutomatico() { const i = DB.estoque.find(i => i.nome.toLowerCase() === document.getElementById('venda-descricao').value.toLowerCase()); if(i) document.getElementById('venda-valor').value = i.preco; }
        carregar();
    </script>
</body>
</html>
