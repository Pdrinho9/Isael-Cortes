<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isael Cortes - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; padding-bottom: 100px; background: #000; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-btn { color: rgba(255,255,255,0.6); }
        .active-tab { background: #fff; color: #000; box-shadow: 0 10px 25px -5px rgba(255, 255, 255, 0.2); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(12px); padding: 20px; }
        .btn-finalize { background: linear-gradient(135deg, #0056b3 0%, #d91111 100%); color: white; transition: all 0.3s ease; }
        .btn-finalize:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-whatsapp { background: #25D366; color: white; transition: all 0.3s ease; }
        
        /* CSS DA LOGO - Ajustado para 'logo.png' */
        .logo-img { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); margin: 0 auto; display: block;}
        
        @media (min-width: 1024px) { body { padding-bottom: 0; } }
    </style>
</head>
<body class="text-slate-100 min-h-screen">

    <div id="modal-senha" class="modal">
        <div class="glass p-8 rounded-[2rem] w-full max-w-xs text-center border-white/20">
            <h3 class="text-xl font-black text-white mb-4 italic uppercase">Admin</h3>
            <input type="password" id="input-senha-admin" placeholder="••••" class="w-full bg-black border border-white/10 rounded-2xl p-4 text-white text-center text-2xl mb-6 outline-none">
            <div class="flex gap-3">
                <button onclick="fecharModais()" class="flex-1 py-3 text-white/60 font-bold text-xs">Sair</button>
                <button onclick="confirmarSenhaAdmin()" class="flex-1 py-3 bg-white text-black rounded-xl font-black uppercase text-xs">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-editor" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-md border-white/10">
            <h3 id="editor-titulo" class="text-2xl font-black text-white mb-8 text-center italic uppercase tracking-tighter">Editar Registro</h3>
            <div id="editor-campos" class="space-y-4"></div>
            <div class="flex flex-col gap-3 mt-10">
                <div class="flex gap-3">
                    <button onclick="fecharModais()" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold text-xs text-white/60">Cancelar</button>
                    <button id="btn-salvar-editor" class="flex-1 py-4 bg-emerald-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Salvar</button>
                </div>
                <button id="btn-excluir-item" class="w-full py-3 text-rose-500 font-bold text-[10px] uppercase tracking-widest hover:bg-rose-500/10 rounded-xl transition-all border border-rose-500/20">
                    <i data-lucide="trash-2" class="inline-block w-3 h-3 mr-1"></i> Excluir Registro
                </button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-black border-r border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen z-50">
            
            <div class="flex flex-col items-center mb-10 text-center">
                <img src="logo.png" alt="Logo Isael Alves" class="logo-img mb-4">
            </div>

            <nav class="space-y-3 flex-1">
                <button onclick="switchTab('vendas')" id="btn-vendas" class="tab-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black active-tab"><i data-lucide="plus-square"></i> NOVO SERVIÇO</button>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="tab-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold hover:bg-white/5 text-left"><i data-lucide="bar-chart-3"></i> PAINEL</button>
                <button onclick="switchTab('clientes')" id="btn-clientes" class="tab-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold hover:bg-white/5 text-left"><i data-lucide="users"></i> CLIENTES</button>
                <button onclick="switchTab('estoque')" id="btn-estoque" class="tab-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold hover:bg-white/5 text-left"><i data-lucide="package"></i> ESTOQUE</button>
                <button onclick="switchTab('config')" id="btn-config" class="tab-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold hover:bg-white/5 text-left"><i data-lucide="settings"></i> EQUIPE</button>
            </nav>
            <button id="logout-btn" onclick="fazerLogout()" class="hidden mt-auto flex items-center gap-2 text-rose-500 font-black text-[10px] uppercase">
                <i data-lucide="log-out" size="14"></i> Sair do Admin
            </button>
        </aside>

        <main class="flex-1 p-6 lg:p-16 bg-black">
            <div id="tab-dashboard" class="tab-content hidden">
                <header class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-black text-white uppercase italic">Dashboard</h2>
                    <select id="filtro-tempo" onchange="renderizarTudo()" class="bg-white text-black text-xs font-black rounded-xl px-6 py-3 outline-none">
                        <option value="hoje">Hoje</option><option value="total">Geral</option>
                    </select>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="glass p-8 rounded-[2.5rem]"><p class="text-[10px] font-black text-white/60 mb-2 uppercase">Faturamento</p><h4 id="dash-faturamento" class="text-4xl font-black text-white italic">R$ 0,00</h4></div>
                    <div class="glass p-8 rounded-[2.5rem]"><p class="text-[10px] font-black text-white/60 mb-2 uppercase">Comissões</p><h4 id="dash-comissoes" class="text-4xl font-black text-sky-400 italic">R$ 0,00</h4></div>
                    <div class="glass p-8 rounded-[2.5rem]"><p class="text-[10px] font-black text-white/60 mb-2 uppercase">Total Bruto</p><h4 id="dash-produtos" class="text-4xl font-black text-purple-400 italic">R$ 0,00</h4></div>
                </div>
                <div id="log-vendas-horario" class="space-y-4 mb-10"></div>
                <div id="lista-barbeiros-comissao" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <div id="tab-vendas" class="tab-content">
                <div class="max-w-xl mx-auto glass p-10 lg:p-14 rounded-[4rem] border-white/10">
                    <h3 class="text-3xl font-black text-white mb-10 text-center uppercase italic">Lançar Registro</h3>
                    <form id="form-venda" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="venda-barbeiro" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required></select>
                            <select id="venda-cliente" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none italic"></select>
                        </div>
                        <input type="text" id="venda-descricao" list="lista-itens-datalist" oninput="atualizarPrecoAutomatico()" placeholder="🔍 O que foi feito?" class="w-full bg-black border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required>
                        <datalist id="lista-itens-datalist"></datalist>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="venda-valor" placeholder="Valor R$" step="0.01" class="bg-black border border-white/10 p-5 rounded-2xl text-white font-black" required>
                            <select id="venda-pagamento" class="bg-black border border-white/10 p-5 rounded-2xl text-white font-bold outline-none" required>
                                <option value="">Pagamento...</option><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão">Cartão</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full py-6 btn-finalize font-black rounded-[2rem] uppercase tracking-widest shadow-2xl shadow-red-500/10">Finalizar e Salvar</button>
                    </form>
                </div>
            </div>

            </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-6 py-4 flex justify-around items-center z-[450] rounded-t-[3rem]">
        <button onclick="switchTab('vendas')" class="mob-btn flex flex-col items-center gap-1 active-tab p-3 rounded-full"><i data-lucide="plus-circle" size="24"></i></button>
        <button onclick="switchTab('dashboard')" class="mob-btn flex flex-col items-center gap-1 p-3 rounded-full"><i data-lucide="layout-grid" size="24"></i></button>
        <button onclick="switchTab('clientes')" class="mob-btn flex flex-col items-center gap-1 p-3 rounded-full"><i data-lucide="users" size="24"></i></button>
        <button id="mob-logout" onclick="fazerLogout()" class="hidden text-rose-500"><i data-lucide="log-out" size="24"></i></button>
    </div>

    <script>
        lucide.createIcons();
        const _supabase = supabase.createClient("https://uijaesuqgnchafnrvnih.supabase.co", "sb_publishable_Ukmk4J2mCb_CRhdgs_qKWA_Z0c5WIgG");
        const SENHA_ADMIN = "1234";
        let DB = { vendas: [], clientes: [], estoque: [], barbeiros: [] };
        let abaDestinoPendente = "";

        const TABELA_GANHOS = {
            "corte": 20.00, "corte barba": 32.50, "corte sobrancelha": 27.50,
            "pezinho": 10.00, "barba": 15.00, "sobrancelha": 7.50,
            "alisante": 12.50, "corte sombra alisante": 35.00, "luzes": 25.00,
            "corte alisante/ pigmentado": 32.50, "corte luzes": 42.50
        };

        function calcularComissao(servico, valor) {
            const s = servico.toLowerCase().trim();
            return TABELA_GANHOS[s] !== undefined ? TABELA_GANHOS[s] : (parseFloat(valor) * 0.50);
        }

        async function carregar() {
            const { data } = await _supabase.from('barbearia').select('*').eq('id', 1).single();
            if (data) { DB = data; renderizarTudo(); }
            verificarStatusAdmin();
        }

        async function salvar() {
            await _supabase.from('barbearia').update({ vendas: DB.vendas, clientes: DB.clientes, estoque: DB.estoque, barbeiros: DB.barbeiros }).eq('id', 1);
        }

        function renderizarTudo() {
            const filtro = document.getElementById('filtro-tempo').value;
            const hoje = new Date().toISOString().split('T')[0];
            let fat = 0, com = 0;
            let bMap = {}; (DB.barbeiros || []).forEach(b => bMap[b.nome] = 0);

            const logCont = document.getElementById('log-vendas-horario'); logCont.innerHTML = '';
            const vFiltradas = (DB.vendas || []).filter(v => filtro === 'total' || v.data === hoje);
            
            [...vFiltradas].reverse().forEach((v, idx) => {
                const val = parseFloat(v.valor); fat += val;
                const cV = calcularComissao(v.descricao, val); com += cV;
                if(bMap[v.barbeiro] !== undefined) bMap[v.barbeiro] += cV;
                const realIdx = DB.vendas.length - 1 - idx;
                logCont.innerHTML += `<div class="flex justify-between items-center p-5 bg-white/[0.03] rounded-2xl border border-white/5">
                    <div class="flex items-center gap-4"><span class="text-white/40 text-xs">${v.hora}</span><div><p class="text-white font-black text-xs uppercase italic">${v.cliente}</p><p class="text-white/40 text-[9px] uppercase">${v.descricao}</p></div></div>
                    <div class="flex items-center gap-4"><div class="text-right"><p class="font-black text-white text-xs">R$ ${val.toFixed(2)}</p><p class="text-sky-500 text-[9px]">Equipe: R$ ${cV.toFixed(2)}</p></div>
                    <button onclick="abrirEditor('venda', ${realIdx})" class="text-white/20 hover:text-white"><i data-lucide="edit-3" size="16"></i></button></div></div>`;
            });

            document.getElementById('dash-faturamento').innerText = "R$ " + fat.toFixed(2);
            document.getElementById('dash-comissoes').innerText = "R$ " + com.toFixed(2);
            document.getElementById('dash-produtos').innerText = "R$ " + fat.toFixed(2);

            const bCont = document.getElementById('lista-barbeiros-comissao'); bCont.innerHTML = '';
            Object.entries(bMap).forEach(([n, v]) => {
                bCont.innerHTML += `<div class="glass p-5 rounded-2xl flex justify-between font-bold text-xs"><span>${n}</span><span class="text-white">R$ ${v.toFixed(2)}</span></div>`;
            });

            document.getElementById('venda-barbeiro').innerHTML = DB.barbeiros.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('venda-cliente').innerHTML = '<option value="Consumidor">Cliente...</option>' + DB.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('lista-itens-datalist').innerHTML = DB.estoque.map(i => `<option value="${i.nome}">`).join('');
            lucide.createIcons();
        }

        function abrirEditor(tipo, idIdx = null) {
            const c = document.getElementById('editor-campos'); const t = document.getElementById('editor-titulo');
            const btnDel = document.getElementById('btn-excluir-item');
            c.innerHTML = ''; document.getElementById('modal-editor').style.display = 'flex'; btnDel.style.display = 'block';

            if (tipo === 'venda') {
                const v = DB.vendas[idIdx]; t.innerText = "Editar Venda";
                c.innerHTML = `<input type="number" id="ed-v-v" value="${v.valor}" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-black"><select id="ed-v-b" class="w-full bg-black border border-white/10 p-4 rounded-xl text-white font-bold">${DB.barbeiros.map(b => `<option ${b.nome==v.barbeiro?'selected':''}>${b.nome}</option>`).join('')}</select>`;
                document.getElementById('btn-salvar-editor').onclick = async () => { DB.vendas[idIdx].valor = document.getElementById('ed-v-v').value; DB.vendas[idIdx].barbeiro = document.getElementById('ed-v-b').value; fecharModais(); await salvar(); carregar(); };
                btnDel.onclick = async () => { if(confirm("Excluir?")) { DB.vendas.splice(idIdx, 1); fecharModais(); await salvar(); carregar(); } };
            }
            lucide.createIcons();
        }

        function switchTab(t) {
            if(['dashboard', 'estoque', 'config', 'clientes'].includes(t)) {
                if(sessionStorage.getItem('is_admin') === 'true') { executarTrocaTab(t); } 
                else { abaDestinoPendente = t; document.getElementById('modal-senha').style.display = 'flex'; }
            } else { executarTrocaTab(t); }
        }

        function executarTrocaTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.tab-btn, .mob-btn').forEach(b => b.classList.remove('active-tab'));
            const btnD = document.getElementById('btn-' + t); if(btnD) btnD.classList.add('active-tab');
            fecharModais();
        }

        function confirmarSenhaAdmin() {
            if(document.getElementById('input-senha-admin').value === SENHA_ADMIN) {
                sessionStorage.setItem('is_admin', 'true'); verificarStatusAdmin(); executarTrocaTab(abaDestinoPendente);
            } else alert("Incorreto!");
        }

        function fazerLogout() { sessionStorage.removeItem('is_admin'); verificarStatusAdmin(); switchTab('vendas'); }
        function verificarStatusAdmin() {
            const status = sessionStorage.getItem('is_admin') === 'true';
            document.getElementById('logout-btn').classList.toggle('hidden', !status);
            document.getElementById('mob-logout').classList.toggle('hidden', !status);
        }
        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        document.getElementById('form-venda').addEventListener('submit', async function(e) {
            e.preventDefault(); const agora = new Date();
            DB.vendas.push({ 
                barbeiro: document.getElementById('venda-barbeiro').value, cliente: document.getElementById('venda-cliente').value, 
                descricao: document.getElementById('venda-descricao').value, valor: document.getElementById('venda-valor').value, 
                pagamento: document.getElementById('venda-pagamento').value, 
                data: agora.toISOString().split('T')[0], hora: agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0')
            });
            await salvar(); this.reset(); alert("Salvo!"); carregar();
        });

        function atualizarPrecoAutomatico() {
            const item = DB.estoque.find(i => i.nome === document.getElementById('venda-descricao').value);
            if(item) document.getElementById('venda-valor').value = item.preco;
        }

        carregar();
    </script>
</body>
</html>
