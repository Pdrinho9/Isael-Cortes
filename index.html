<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isael Alves Cortes - Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Paleta Black e Ajustes Visuais */
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; padding-bottom: 100px; background: #000000; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-tab { background: #ffffff; color: #000000; box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.2); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(12px); padding: 20px; }
        .btn-whatsapp { background: #25D366; color: white; transition: all 0.3s ease; }
        .tipo-btn-active { border-color: #ffffff; background: rgba(255, 255, 255, 0.1); color: white; }
        
        /* Estilização da Logo */
        .brand-logo { width: 140px; height: auto; margin-bottom: 2rem; }
        
        @media (min-width: 1024px) { body { padding-bottom: 0; } }
    </style>
</head>
<body class="text-slate-300 min-h-screen">

    <div id="modal-senha" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-xs text-center border-white/10">
            <h3 class="text-xl font-black text-white mb-4 italic uppercase">Acesso Restrito</h3>
            <input type="password" id="input-senha-admin" placeholder="••••" class="w-full bg-black border border-white/10 rounded-2xl p-4 text-white text-center text-2xl mb-6 outline-none">
            <div class="flex gap-3">
                <button onclick="fecharModais()" class="flex-1 py-3 text-slate-500 font-bold text-xs">Sair</button>
                <button onclick="confirmarSenhaAdmin()" class="flex-1 py-3 bg-white text-black rounded-xl font-black uppercase text-xs">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-editor" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-md border-white/10">
            <h3 id="editor-titulo" class="text-2xl font-black text-white mb-6 text-center italic uppercase">Editor</h3>
            <div id="seletor-tipo" class="flex gap-2 mb-6">
                <button onclick="setTipoNovoItem('Serviço')" id="tipo-servico" class="flex-1 py-3 rounded-xl border border-white/10 text-[10px] font-black uppercase flex flex-col items-center gap-1">Serviço</button>
                <button onclick="setTipoNovoItem('Produto')" id="tipo-produto" class="flex-1 py-3 rounded-xl border border-white/10 text-[10px] font-black uppercase flex flex-col items-center gap-1">Produto</button>
            </div>
            <div id="editor-campos" class="space-y-4"></div>
            <div class="flex flex-col gap-3 mt-10">
                <div class="flex gap-3">
                    <button onclick="fecharModais()" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold text-xs text-slate-500">Cancelar</button>
                    <button id="btn-salvar-editor" class="flex-1 py-4 bg-white text-black rounded-2xl font-black uppercase text-xs">Salvar</button>
                </div>
                <button id="btn-excluir-item" class="w-full py-3 text-rose-600 font-bold text-[10px] uppercase tracking-widest border border-rose-600/20 rounded-xl">Remover Registro</button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-black border-r border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen z-50">
            <div class="flex justify-center">
                <img src="Logo.png" alt="Isael Alves Cortes" class="brand-logo">
            </div>
            <nav class="space-y-3 flex-1">
                <button onclick="switchTab('vendas')" id="btn-vendas" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black active-tab"><i data-lucide="plus-square"></i> NOVO SERVIÇO</button>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="bar-chart-3"></i> PAINEL</button>
                <button onclick="switchTab('clientes')" id="btn-clientes" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="users"></i> CLIENTES</button>
                <button onclick="switchTab('estoque')" id="btn-estoque" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="package"></i> ESTOQUE</button>
                <button onclick="switchTab('config')" id="btn-config" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="settings"></i> EQUIPE</button>
            </nav>
            <button id="logout-btn" onclick="fazerLogout()" class="hidden mt-auto flex items-center gap-2 text-rose-500 font-black text-[10px] uppercase">Sair do Admin</button>
        </aside>

        <main class="flex-1 p-6 lg:p-16">
            <div id="tab-vendas" class="tab-content">
                <div class="max-w-xl mx-auto glass p-10 lg:p-14 rounded-[4rem] border-white/5">
                    <h3 class="text-3xl font-black text-white mb-10 text-center uppercase italic">Lançar Registro</h3>
                    <form id="form-venda" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="venda-barbeiro" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required></select>
                            <select id="venda-cliente" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none italic"></select>
                        </div>
                        <input type="text" id="venda-descricao" list="lista-itens-datalist" oninput="atualizarPrecoAutomatico()" placeholder="🔍 Qual foi o serviço?" class="w-full bg-black border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required>
                        <datalist id="lista-itens-datalist"></datalist>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="venda-valor" placeholder="Valor R$" step="0.01" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none font-black" required>
                            <select id="venda-pagamento" class="bg-black border border-white/10 p-5 rounded-2xl text-white outline-none font-bold" required>
                                <option value="">Pagamento...</option><option value="Pix">Pix</option><option value="Cartão">Cartão</option><option value="Dinheiro">Dinheiro</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full py-6 bg-white text-black font-black rounded-[2rem] uppercase shadow-2xl shadow-white/5">Finalizar e Salvar</button>
                    </form>
                </div>
            </div>

            <div id="tab-dashboard" class="tab-content hidden">
                <header class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-black text-white uppercase italic">Dashboard</h2>
                    <select id="filtro-tempo" onchange="renderizarTudo()" class="bg-white text-black text-xs font-black rounded-xl px-6 py-3 outline-none">
                        <option value="hoje">Hoje</option><option value="total">Geral</option>
                    </select>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="glass p-8 rounded-[2.5rem]"><p class="text-[10px] font-black text-slate-500 mb-2 uppercase">Faturamento</p><h4 id="dash-faturamento" class="text-4xl font-black text-white italic">R$ 0,00</h4></div>
                    <div class="glass p-8 rounded-[2.5rem] border-sky-500/20"><p class="text-[10px] font-black text-sky-500 mb-2 uppercase">Comissões</p><h4 id="dash-comissoes" class="text-4xl font-black text-white italic">R$ 0,00</h4></div>
                    <div class="glass p-8 rounded-[2.5rem] border-rose-500/20"><p class="text-[10px] font-black text-rose-500 mb-2 uppercase">Lançamentos</p><h4 id="dash-lancamentos" class="text-4xl font-black text-white italic">0</h4></div>
                </div>
                <div id="log-vendas-horario" class="space-y-4 mb-10"></div>
                <div id="lista-barbeiros-comissao" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
            </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/5 px-6 py-4 flex justify-around items-center z-[450] rounded-t-[3rem]">
        <button onclick="switchTab('vendas')" class="mob-btn flex flex-col items-center gap-1 text-white"><i data-lucide="plus-circle" size="28"></i></button>
        <button onclick="switchTab('dashboard')" class="mob-btn flex flex-col items-center gap-1 text-slate-600"><i data-lucide="layout-grid" size="28"></i></button>
        <button onclick="switchTab('clientes')" class="mob-btn flex flex-col items-center gap-1 text-slate-600"><i data-lucide="users" size="28"></i></button>
    </div>

    <script>
        // O Script permanece 100% igual ao anterior, apenas mantendo a lógica de cálculo que já fizemos.
        // Certifique-se de manter o objeto TABELA_GANHOS e as funções de salvar/carregar.
        lucide.createIcons();
        // [CÓDIGO JS ANTERIOR CONTINUA AQUI]
    </script>
</body>
</html>
