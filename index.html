<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isael Cortes - Gestão Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; padding-bottom: 100px; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-tab { background: #10b981; color: #020617; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        @media (min-width: 1024px) { body { padding-bottom: 0; } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <div id="modal-senha" class="modal">
        <div class="glass p-8 rounded-[2rem] w-full max-w-xs text-center border-emerald-500/20">
            <h3 class="text-xl font-black text-emerald-500 mb-6 uppercase italic">Acesso Restrito</h3>
            <input type="password" id="input-senha-admin" placeholder="••••" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white text-center text-2xl mb-6 outline-none">
            <div class="flex gap-3">
                <button onclick="fecharModais()" class="flex-1 py-3 text-slate-400 font-bold">Cancelar</button>
                <button onclick="confirmarSenhaAdmin()" class="flex-1 py-3 bg-emerald-500 text-slate-950 rounded-xl font-black uppercase">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-editor" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md">
            <h3 id="editor-titulo" class="text-2xl font-black text-emerald-400 mb-8 text-center uppercase italic">Editar</h3>
            <div id="editor-campos" class="space-y-4"></div>
            <div class="flex gap-3 mt-10">
                <button onclick="fecharModais()" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold text-slate-400">Voltar</button>
                <button id="btn-salvar-editor" class="flex-1 py-4 bg-emerald-500 text-slate-950 rounded-2xl font-black uppercase">Salvar</button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900/50 border-r border-white/5 p-6 hidden lg:flex flex-col sticky top-0 h-screen">
            <div class="mb-10">
                <h1 class="text-2xl font-black text-white uppercase italic">Isael<span class="text-emerald-400">Cortes</span></h1>
                <button id="btn-logout-desktop" onclick="fazerLogoutAdmin()" class="hidden mt-2 text-[9px] font-black text-rose-500 uppercase flex items-center gap-1 hover:text-rose-400"><i data-lucide="log-out" size="10"></i> Sair do Admin</button>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('vendas')" id="btn-vendas" class="nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl font-black active-tab"><i data-lucide="plus-square"></i> LANÇAR</button>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl font-bold text-slate-400 hover:bg-white/5"><i data-lucide="layout-dashboard"></i> PAINEL</button>
                <button onclick="switchTab('clientes')" id="btn-clientes" class="nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl font-bold text-slate-400 hover:bg-white/5"><i data-lucide="users"></i> CLIENTES</button>
                <button onclick="switchTab('estoque')" id="btn-estoque" class="nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl font-bold text-slate-400 hover:bg-white/5"><i data-lucide="package"></i> ESTOQUE</button>
                <button onclick="switchTab('config')" id="btn-config" class="nav-btn w-full flex items-center gap-3 px-4 py-4 rounded-xl font-bold text-slate-400 hover:bg-white/5"><i data-lucide="settings"></i> EQUIPE</button>
            </nav>
        </aside>

        <main class="flex-1 p-4 lg:p-12">
            <div class="lg:hidden flex justify-between items-center mb-6">
                <h1 class="text-xl font-black italic">ISAEL <span class="text-emerald-500">CORTES</span></h1>
                <button id="btn-logout-mobile" onclick="fazerLogoutAdmin()" class="hidden bg-rose-500/10 text-rose-500 px-3 py-1 rounded-lg text-[10px] font-black uppercase">Sair Admin</button>
            </div>
            
            <div id="tab-dashboard" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black uppercase italic">Painel</h2>
                    <select id="filtro-tempo" onchange="renderizarTudo()" class="bg-emerald-500 text-slate-950 font-black px-4 py-2 rounded-lg text-xs outline-none">
                        <option value="hoje">HOJE</option><option value="total">GERAL</option>
                    </select>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="glass p-6 rounded-3xl"><p class="text-[10px] font-black text-slate-500 uppercase">Faturamento</p><h4 id="dash-faturamento" class="text-3xl font-black text-white italic">R$ 0,00</h4></div>
                    <div class="glass p-6 rounded-3xl"><p class="text-[10px] font-black text-slate-500 uppercase">Ganhos Equipe</p><h4 id="dash-comissoes" class="text-3xl font-black text-sky-400 italic">R$ 0,00</h4></div>
                    <div class="glass p-6 rounded-3xl"><p class="text-[10px] font-black text-slate-500 uppercase">Produtos</p><h4 id="dash-produtos" class="text-3xl font-black text-purple-400 italic">R$ 0,00</h4></div>
                </div>
                <div class="glass p-6 rounded-[2.5rem] mb-8">
                    <h3 class="font-black text-white mb-6 uppercase flex items-center gap-2 italic"><i data-lucide="history"></i> Histórico</h3>
                    <div id="log-vendas-horario" class="space-y-3"></div>
                </div>
                <div id="lista-barbeiros-comissao" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="tab-clientes" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-3xl font-black uppercase italic">Clientes</h3>
                    <button onclick="abrirEditor('novo_cliente')" class="bg-emerald-500 text-slate-950 px-6 py-3 rounded-xl font-black text-xs uppercase">+ Novo</button>
                </div>
                <div id="lista-completa-clientes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <div id="tab-estoque" class="tab-content hidden">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-3xl font-black uppercase italic">Estoque</h3>
                    <button onclick="abrirEditor('novo_produto')" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-black text-xs uppercase">+ Novo Item</button>
                </div>
                <div id="lista-estoque" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="tab-config" class="tab-content hidden">
                <div class="max-w-md mx-auto glass p-8 rounded-[2rem]">
                    <h3 class="text-2xl font-black text-white mb-8 text-center uppercase italic">Time Isael</h3>
                    <div id="lista-equipe" class="space-y-3 mb-8"></div>
                    <button onclick="abrirEditor('novo_barbeiro')" class="w-full py-4 border border-emerald-500/30 text-emerald-400 rounded-xl font-black text-xs uppercase">Adicionar Barbeiro</button>
                </div>
            </div>

            <div id="tab-vendas" class="tab-content">
                <div class="max-w-lg mx-auto glass p-8 lg:p-12 rounded-[3rem]">
                    <h3 class="text-3xl font-black text-white mb-8 text-center uppercase italic">Novo Serviço</h3>
                    <form id="form-venda" class="space-y-5">
                        <select id="venda-barbeiro" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold outline-none" required></select>
                        <select id="venda-cliente" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white italic outline-none"></select>
                        <input type="text" id="venda-descricao" list="lista-itens-datalist" oninput="atualizarPrecoAutomatico()" placeholder="O que foi feito?" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold outline-none" required>
                        <datalist id="lista-itens-datalist"></datalist>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="venda-valor" placeholder="R$ Valor" step="0.01" class="bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-black outline-none" required>
                            <select id="venda-pagamento" class="bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold outline-none" required>
                                <option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartão">Cartão</option>
                            </select>
                        </div>
                        <label class="flex items-center gap-3 p-4 bg-emerald-500/5 rounded-xl cursor-pointer border border-emerald-500/10">
                            <input type="checkbox" id="venda-e-produto" class="w-5 h-5 accent-emerald-500">
                            <span class="text-xs font-black uppercase text-emerald-500 italic">Venda de Produto (10%)</span>
                        </label>
                        <button type="submit" class="w-full py-5 bg-emerald-500 text-slate-950 font-black rounded-2xl uppercase tracking-widest active:scale-95 transition-all">Salvar Agora</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-4 py-3 flex justify-around items-center z-[400] rounded-t-3xl">
        <button onclick="switchTab('vendas')" class="mob-btn flex flex-col items-center gap-1 text-emerald-400"><i data-lucide="scissors" size="24"></i><span class="text-[8px] font-black uppercase">Lançar</span></button>
        <button onclick="switchTab('dashboard')" class="mob-btn flex flex-col items-center gap-1 text-slate-500"><i data-lucide="bar-chart-2" size="24"></i><span class="text-[8px] font-black uppercase">Painel</span></button>
        <button onclick="switchTab('clientes')" class="mob-btn flex flex-col items-center gap-1 text-slate-500"><i data-lucide="users" size="24"></i><span class="text-[8px] font-black uppercase">Clientes</span></button>
        <button onclick="switchTab('estoque')" class="mob-btn flex flex-col items-center gap-1 text-slate-500"><i data-lucide="package" size="24"></i><span class="text-[8px] font-black uppercase">Itens</span></button>
    </div>

    <script>
        lucide.createIcons();
        const _supabase = supabase.createClient("https://uijaesuqgnchafnrvnih.supabase.co", "sb_publishable_Ukmk4J2mCb_CRhdgs_qKWA_Z0c5WIgG");
        const SENHA_ADMIN = "1234";
        let DB = { vendas: [], clientes: [], estoque: [], barbeiros: [] };
        let abaDestinoPendente = "";

        const COMISSOES_FIXAS = {
            "corte": 20.00, "corte barba": 32.50, "corte sobrancelha": 27.50,
            "pezinho": 10.00, "barba": 15.00, "sobrancelha": 7.50,
            "alisante": 12.50, "corte sombra alisante": 35.00, "luzes": 25.00,
            "corte alisante/ pigmentado": 32.50, "corte luzes": 42.50
        };

        function calcularGanho(servico, valor, eProd) {
            if(eProd) return parseFloat(valor) * 0.10;
            const s = servico.toLowerCase().trim();
            return COMISSOES_FIXAS[s] !== undefined ? COMISSOES_FIXAS[s] : (parseFloat(valor) * 0.50);
        }

        async function carregar() {
            const { data } = await _supabase.from('barbearia').select('*').eq('id', 1).single();
            if (data) { DB = data; renderizarTudo(); atualizarVisibilidadeLogout(); }
        }

        async function salvar() {
            await _supabase.from('barbearia').update({ vendas: DB.vendas, clientes: DB.clientes, estoque: DB.estoque, barbeiros: DB.barbeiros }).eq('id', 1);
        }

        function fazerLogoutAdmin() {
            sessionStorage.removeItem('is_admin');
            atualizarVisibilidadeLogout();
            switchTab('vendas');
            alert("Você saiu do modo Admin.");
        }

        function atualizarVisibilidadeLogout() {
            const isAdmin = sessionStorage.getItem('is_admin') === 'true';
            document.getElementById('btn-logout-desktop').classList.toggle('hidden', !isAdmin);
            document.getElementById('btn-logout-mobile').classList.toggle('hidden', !isAdmin);
        }

        function renderizarTudo() {
            const filtro = document.getElementById('filtro-tempo').value;
            const hoje = new Date().toISOString().split('T')[0];
            let fat = 0, com = 0, prod = 0;
            let bMap = {}; (DB.barbeiros || []).forEach(b => bMap[b.nome] = 0);

            const log = document.getElementById('log-vendas-horario'); log.innerHTML = '';
            const vendasFiltradas = (DB.vendas || []).filter(v => filtro === 'total' || v.data === hoje);
            
            [...vendasFiltradas].reverse().forEach((v, idxOrig) => {
                const val = parseFloat(v.valor); fat += val;
                const cV = calcularGanho(v.descricao, val, v.eProduto); 
                com += cV; if(v.eProduto) prod += val;
                if(bMap[v.barbeiro] !== undefined) bMap[v.barbeiro] += cV;

                const realIdx = DB.vendas.length - 1 - idxOrig;
                log.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <div class="flex items-center gap-3">
                            <span class="text-emerald-400 font-black text-[9px]">${v.hora || '--:--'}</span>
                            <div><p class="text-white font-black text-xs uppercase">${v.cliente}</p>
                            <p class="text-slate-500 font-bold text-[7px] uppercase tracking-tighter">${v.descricao} | ${v.barbeiro}</p></div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right font-black"><p class="text-white text-xs">R$ ${val.toFixed(2)}</p><p class="text-sky-500 text-[8px]">G: R$ ${cV.toFixed(2)}</p></div>
                            <button onclick="excluirItem('venda', ${realIdx})" class="text-rose-500/40 hover:text-rose-500"><i data-lucide="trash-2" size="14"></i></button>
                        </div>
                    </div>`;
            });

            document.getElementById('dash-faturamento').innerText = "R$ " + fat.toFixed(2);
            document.getElementById('dash-comissoes').innerText = "R$ " + com.toFixed(2);
            document.getElementById('dash-produtos').innerText = "R$ " + prod.toFixed(2);

            const bCont = document.getElementById('lista-barbeiros-comissao'); bCont.innerHTML = '';
            Object.entries(bMap).forEach(([n, v]) => {
                bCont.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between font-black text-[10px] uppercase"><span>${n}</span><span class="text-emerald-400 font-black italic">R$ ${v.toFixed(2)}</span></div>`;
            });

            document.getElementById('venda-barbeiro').innerHTML = '<option value="">Quem atendeu?</option>' + DB.barbeiros.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('venda-cliente').innerHTML = '<option value="Consumidor">Cliente Avulso</option>' + DB.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('lista-itens-datalist').innerHTML = DB.estoque.map(i => `<option value="${i.nome}">`).join('');

            renderizarListas(); lucide.createIcons();
        }

        function renderizarListas() {
            const cliL = document.getElementById('lista-completa-clientes'); cliL.innerHTML = '';
            DB.clientes.forEach(c => cliL.innerHTML += `
                <div class="glass p-5 rounded-3xl flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <div><h4 class="font-black text-white uppercase italic text-sm">${c.nome}</h4><p class="text-[9px] text-slate-500 font-bold tracking-widest">${c.celular || 'S/ Whats'}</p></div>
                        <button onclick="excluirItem('cliente', ${c.id})" class="text-rose-500/20 hover:text-rose-500"><i data-lucide="x-circle" size="18"></i></button>
                    </div>
                    <a href="https://wa.me/55${c.celular?.replace(/\D/g,'')}" target="_blank" class="bg-[#25D366] text-white py-3 rounded-xl flex items-center justify-center gap-2 font-black text-[9px] uppercase"><i data-lucide="message-square" size="14"></i> WhatsApp</a>
                </div>`);

            const estL = document.getElementById('lista-estoque'); estL.innerHTML = '';
            DB.estoque.forEach(i => estL.innerHTML += `
                <div class="glass p-4 rounded-3xl flex justify-between items-center">
                    <div><p class="font-black text-white uppercase text-xs">${i.nome}</p><p class="text-[8px] text-slate-500 font-black uppercase">${i.tipo}</p></div>
                    <div class="flex items-center gap-4"><span class="font-black text-white text-xs">R$ ${parseFloat(i.preco).toFixed(2)}</span>
                    <button onclick="excluirItem('produto', ${i.id})" class="text-rose-500/20 hover:text-rose-500"><i data-lucide="trash-2" size="16"></i></button></div>
                </div>`);

            const teamL = document.getElementById('lista-equipe'); teamL.innerHTML = '';
            DB.barbeiros.forEach((b, idx) => teamL.innerHTML += `
                <div class="bg-white/5 p-4 rounded-xl flex justify-between items-center">
                    <span class="font-black uppercase italic text-xs">${b.nome}</span>
                    <button onclick="excluirItem('barbeiro', ${idx})" class="text-rose-500/20 hover:text-rose-500"><i data-lucide="trash-2" size="16"></i></button>
                </div>`);
        }

        async function excluirItem(tipo, idIdx) {
            if(!confirm("Tem certeza que deseja apagar este item?")) return;
            if(tipo === 'venda') DB.vendas.splice(idIdx, 1);
            else if(tipo === 'cliente') DB.clientes = DB.clientes.filter(x => x.id != idIdx);
            else if(tipo === 'produto') DB.estoque = DB.estoque.filter(x => x.id != idIdx);
            else if(tipo === 'barbeiro') DB.barbeiros.splice(idIdx, 1);
            await salvar(); carregar();
        }

        function abrirEditor(tipo) {
            const c = document.getElementById('editor-campos'); const t = document.getElementById('editor-titulo');
            c.innerHTML = ''; document.getElementById('modal-editor').style.display = 'flex';
            if (tipo === 'novo_cliente') {
                t.innerText = "Novo Cliente";
                c.innerHTML = `<input id="ed-c-n" placeholder="Nome Completo" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold"><input id="ed-c-w" placeholder="WhatsApp (DDD)" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold">`;
                document.getElementById('btn-salvar-editor').onclick = async () => { DB.clientes.push({id:Date.now(),nome:document.getElementById('ed-c-n').value,celular:document.getElementById('ed-c-w').value,dataUltimo:new Date().toISOString()}); fecharModais(); await salvar(); carregar(); };
            } else if (tipo === 'novo_produto') {
                t.innerText = "Novo Item";
                c.innerHTML = `<input id="ed-p-n" placeholder="Nome do Item" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold"><input type="number" id="ed-p-v" placeholder="Preço" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold"><select id="ed-p-t" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold"><option>Serviço</option><option>Produto</option></select>`;
                document.getElementById('btn-salvar-editor').onclick = async () => { DB.estoque.push({id:Date.now(),nome:document.getElementById('ed-p-n').value,preco:document.getElementById('ed-p-v').value,tipo:document.getElementById('ed-p-t').value}); fecharModais(); await salvar(); carregar(); };
            } else if (tipo === 'novo_barbeiro') {
                t.innerText = "Novo Barbeiro";
                c.innerHTML = `<input id="ed-b-n" placeholder="Nome do Barbeiro" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-white font-bold">`;
                document.getElementById('btn-salvar-editor').onclick = async () => { DB.barbeiros.push({nome:document.getElementById('ed-b-n').value}); fecharModais(); await salvar(); carregar(); };
            }
        }

        function switchTab(t) {
            if(['dashboard', 'estoque', 'config', 'clientes'].includes(t)) {
                if(sessionStorage.getItem('is_admin') === 'true') { executarTrocaTab(t); } 
                else { abaDestinoPendente = t; document.getElementById('modal-senha').style.display = 'flex'; }
            } else { executarTrocaTab(t); }
        }

        function executarTrocaTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            const bD = document.getElementById('btn-' + t); if(bD) bD.classList.add('active-tab');
            document.querySelectorAll('.mob-btn').forEach(b => b.classList.replace('text-emerald-400', 'text-slate-500'));
            const bM = Array.from(document.querySelectorAll('.mob-btn')).find(b => b.getAttribute('onclick').includes(t));
            if(bM) bM.classList.replace('text-slate-500', 'text-emerald-400');
            fecharModais();
        }

        function confirmarSenhaAdmin() {
            if(document.getElementById('input-senha-admin').value === SENHA_ADMIN) {
                sessionStorage.setItem('is_admin', 'true'); 
                atualizarVisibilidadeLogout();
                executarTrocaTab(abaDestinoPendente);
            } else alert("Senha incorreta!");
        }

        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        document.getElementById('form-venda').addEventListener('submit', async function(e) {
            e.preventDefault(); const agora = new Date();
            DB.vendas.push({ 
                barbeiro: document.getElementById('venda-barbeiro').value, 
                cliente: document.getElementById('venda-cliente').value, 
                descricao: document.getElementById('venda-descricao').value, 
                valor: document.getElementById('venda-valor').value, 
                pagamento: document.getElementById('venda-pagamento').value,
                eProduto: document.getElementById('venda-e-produto').checked, 
                data: agora.toISOString().split('T')[0],
                hora: agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0')
            });
            await salvar(); this.reset(); alert("Lançado!"); carregar();
        });

        function atualizarPrecoAutomatico() {
            const item = DB.estoque.find(i => i.nome === document.getElementById('venda-descricao').value);
            if(item) { document.getElementById('venda-valor').value = item.preco; document.getElementById('venda-e-produto').checked = (item.tipo === "Produto"); }
        }

        carregar();
    </script>
</body>
</html>
