<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isael Cortes - Gestão Total</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; padding-bottom: 90px; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { background: #10b981; color: #020617; box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        @media (min-width: 1024px) { body { padding-bottom: 0; } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <div id="modal-senha" class="modal">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-xs border-emerald-500/20 text-center">
            <i data-lucide="lock" class="mx-auto mb-4 text-emerald-500"></i>
            <h3 class="text-xl font-black text-white mb-2">Admin</h3>
            <input type="password" id="input-senha-admin" placeholder="••••" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white text-center text-2xl mb-4 outline-none">
            <div class="flex gap-2">
                <button onclick="fecharModais()" class="flex-1 py-3 bg-white/5 rounded-xl text-xs font-bold text-slate-400">Sair</button>
                <button onclick="confirmarSenhaAdmin()" class="flex-1 py-3 bg-emerald-500 text-slate-950 rounded-xl font-black uppercase text-xs">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-editor" class="modal">
        <div class="glass p-8 rounded-[3rem] w-full max-w-md border-white/10">
            <h3 id="editor-titulo" class="text-2xl font-black text-white mb-6 text-center italic">Editar Registro</h3>
            <div id="editor-campos" class="space-y-4">
                </div>
            <div class="flex gap-2 mt-8">
                <button onclick="fecharModais()" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold">Cancelar</button>
                <button id="btn-salvar-editor" class="flex-1 py-4 bg-emerald-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900/40 border-r border-white/5 p-6 hidden lg:flex flex-col sticky top-0 h-screen z-50">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20"><i data-lucide="scissors" class="text-slate-950"></i></div>
                <span class="text-xl font-black text-white uppercase italic">Isael<span class="text-emerald-400">Cortes</span></span>
            </div>
            <nav class="space-y-2 flex-1">
                <button onclick="switchTab('vendas')" id="btn-vendas" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold active-tab"><i data-lucide="shopping-cart"></i> Novo Serviço</button>
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="layout-dashboard"></i> Painel</button>
                <button onclick="switchTab('clientes')" id="btn-clientes" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="users"></i> Clientes</button>
                <button onclick="switchTab('estoque')" id="btn-estoque" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="package"></i> Estoque</button>
                <button onclick="switchTab('config')" id="btn-config" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-500 hover:bg-white/5 text-left"><i data-lucide="settings"></i> Equipe</button>
            </nav>
        </aside>

        <main class="flex-1 p-6 lg:p-12 overflow-y-auto">
            
            <div id="tab-dashboard" class="tab-content hidden">
                <header class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black text-white italic">Gestão Isael</h2>
                    <select id="filtro-tempo" onchange="renderizarTudo()" class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold rounded-lg px-4 py-2 outline-none">
                        <option value="hoje">Hoje</option><option value="total">Acumulado</option>
                    </select>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="glass p-7 rounded-[2.5rem]"><p class="text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Faturamento</p><h4 id="dash-faturamento" class="text-3xl font-black text-white">R$ 0,00</h4></div>
                    <div class="glass p-7 rounded-[2.5rem]"><p class="text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Comissões</p><h4 id="dash-comissoes" class="text-3xl font-black text-sky-400">R$ 0,00</h4></div>
                    <div class="glass p-7 rounded-[2.5rem]"><p class="text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Produtos</p><h4 id="dash-produtos" class="text-3xl font-black text-purple-400">R$ 0,00</h4></div>
                </div>
                
                <div class="bg-white/[0.03] rounded-[2.5rem] p-6 border border-white/5 mb-8">
                    <h3 class="text-lg font-bold text-white mb-6 flex items-center gap-2 italic">Atendimentos Registrados</h3>
                    <div id="log-vendas-horario" class="space-y-3 max-h-96 overflow-y-auto pr-2"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white/[0.03] rounded-[2.5rem] p-8 border border-white/5"><h3 class="text-xl font-bold text-white mb-6">Comissões</h3><div id="lista-barbeiros-comissao" class="space-y-4"></div></div>
                    <div class="bg-white/[0.03] rounded-[2.5rem] p-8 border border-white/5"><h3 class="text-xl font-bold text-white mb-6">Clientes Sumidos</h3><div id="crm-lista" class="space-y-4"></div></div>
                </div>
            </div>

            <div id="tab-clientes" class="tab-content hidden">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h3 class="text-3xl font-black text-white">Clientes</h3>
                    <button onclick="abrirEditor('novo_cliente')" class="w-full md:w-auto bg-emerald-500 text-slate-950 px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-emerald-500/20">Novo Cliente +</button>
                </div>
                <div id="lista-completa-clientes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <div id="tab-estoque" class="tab-content hidden">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h3 class="text-3xl font-black text-white">Itens & Preços</h3>
                    <button onclick="abrirEditor('novo_produto')" class="w-full md:w-auto bg-purple-500 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-purple-500/20">Novo Item +</button>
                </div>
                <div id="lista-estoque" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="tab-config" class="tab-content hidden">
                <div class="max-w-xl mx-auto glass p-8 rounded-[3rem]">
                    <h3 class="text-2xl font-black text-white mb-6 italic text-center">Gestão de Equipe</h3>
                    <div id="lista-equipe" class="space-y-3 mb-8"></div>
                    <button onclick="abrirEditor('novo_barbeiro')" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold text-xs uppercase hover:bg-white/10 transition-all text-emerald-400">Adicionar Barbeiro</button>
                </div>
            </div>

            <div id="tab-vendas" class="tab-content">
                <div class="max-w-xl mx-auto glass p-8 rounded-[3rem] shadow-2xl">
                    <h3 class="text-2xl font-black text-white mb-8 text-center uppercase tracking-tighter">Lançar Atendimento</h3>
                    <form id="form-venda" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <select id="venda-barbeiro" class="bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white outline-none" required></select>
                            <select id="venda-cliente" class="bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white outline-none italic"></select>
                        </div>
                        <div class="relative">
                            <input type="text" id="venda-descricao" list="lista-itens-datalist" oninput="atualizarPrecoAutomatico()" placeholder="🔍 O que foi feito?" class="w-full bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white outline-none" required>
                            <datalist id="lista-itens-datalist"></datalist>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="venda-valor" placeholder="Valor R$" step="0.01" class="bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white outline-none" required>
                            <select id="venda-pagamento" class="bg-slate-900/50 border border-white/10 p-4 rounded-2xl text-white outline-none" required>
                                <option value="">Pagamento...</option><option value="Pix">Pix</option><option value="Cartão">Cartão</option><option value="Dinheiro">Dinheiro</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-3 p-4 bg-white/5 rounded-2xl border border-white/5">
                            <input type="checkbox" id="venda-e-produto" class="w-6 h-6 accent-emerald-500 rounded-lg"><label for="venda-e-produto" class="text-sm font-bold text-slate-400 uppercase italic">É Produto? (10% de comissão)</label>
                        </div>
                        <button type="submit" class="w-full py-5 bg-emerald-500 text-slate-950 font-black rounded-[1.5rem] uppercase tracking-widest shadow-xl shadow-emerald-500/20 active:scale-95 transition-transform">Finalizar</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-4 py-3 flex justify-around items-center z-[400] rounded-t-[2.5rem]">
        <button onclick="switchTab('vendas')" class="mob-btn flex flex-col items-center gap-1 text-emerald-400">
            <i data-lucide="plus-circle" size="24"></i><span class="text-[9px] font-bold uppercase">Lançar</span>
        </button>
        <button onclick="switchTab('dashboard')" class="mob-btn flex flex-col items-center gap-1 text-slate-500">
            <i data-lucide="bar-chart-3" size="24"></i><span class="text-[9px] font-bold uppercase">Painel</span>
        </button>
        <button onclick="switchTab('clientes')" class="mob-btn flex flex-col items-center gap-1 text-slate-500">
            <i data-lucide="users" size="24"></i><span class="text-[9px] font-bold uppercase">Clientes</span>
        </button>
        <button onclick="switchTab('estoque')" class="mob-btn flex flex-col items-center gap-1 text-slate-500">
            <i data-lucide="package" size="24"></i><span class="text-[9px] font-bold uppercase">Itens</span>
        </button>
    </div>

    <script>
        lucide.createIcons();
        const _supabase = supabase.createClient("https://uijaesuqgnchafnrvnih.supabase.co", "sb_publishable_Ukmk4J2mCb_CRhdgs_qKWA_Z0c5WIgG");
        const SENHA_ADMIN = "1234";
        let DB = { vendas: [], clientes: [], estoque: [], barbeiros: [] };
        let abaDestinoPendente = "";

        async function carregar() {
            const { data, error } = await _supabase.from('barbearia').select('*').eq('id', 1).single();
            if (!error && data) { DB = { ...data }; renderizarTudo(); }
        }

        async function salvar() {
            await _supabase.from('barbearia').update({ 
                vendas: DB.vendas, clientes: DB.clientes, estoque: DB.estoque, barbeiros: DB.barbeiros 
            }).eq('id', 1);
        }

        function formatarMoeda(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function renderizarTudo() {
            const filtro = document.getElementById('filtro-tempo').value;
            const hoje = new Date().toISOString().split('T')[0];
            let fat = 0, com = 0, prod = 0;
            let bMap = {}; (DB.barbeiros || []).forEach(b => bMap[b.nome] = 0);

            const logCont = document.getElementById('log-vendas-horario'); logCont.innerHTML = '';
            const vendasFiltradas = (DB.vendas || []).filter(v => filtro === 'total' || v.data === hoje);
            
            [...vendasFiltradas].reverse().forEach((v, idxOriginal) => {
                const val = parseFloat(v.valor); fat += val;
                const cV = val * (v.eProduto ? 0.10 : 0.50); com += cV;
                if(v.eProduto) prod += val;
                if(bMap[v.barbeiro] !== undefined) bMap[v.barbeiro] += cV;

                const realIdx = DB.vendas.length - 1 - idxOriginal;
                logCont.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5 text-xs hover:bg-white/10 transition-all">
                        <div class="flex items-center gap-3">
                            <span class="text-emerald-400 font-black bg-emerald-400/10 px-2 py-1 rounded-lg">${v.hora || '--:--'}</span>
                            <div>
                                <p class="text-white font-bold">${v.cliente || 'Consumidor'}</p>
                                <p class="text-slate-500 uppercase text-[9px]">${v.descricao} (${v.barbeiro})</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-black text-white">${formatarMoeda(val)}</span>
                            <button onclick="abrirEditor('venda', ${realIdx})" class="text-slate-500 hover:text-sky-400"><i data-lucide="edit-2" size="14"></i></button>
                        </div>
                    </div>`;
            });

            document.getElementById('dash-faturamento').innerText = formatarMoeda(fat);
            document.getElementById('dash-comissoes').innerText = formatarMoeda(com);
            document.getElementById('dash-produtos').innerText = formatarMoeda(prod);

            const bCont = document.getElementById('lista-barbeiros-comissao'); bCont.innerHTML = '';
            Object.entries(bMap).forEach(([n, v]) => {
                bCont.innerHTML += `<div class="flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5 text-sm"><span>${n}</span><span class="font-black text-emerald-400">${formatarMoeda(v)}</span></div>`;
            });

            const bSel = document.getElementById('venda-barbeiro'); bSel.innerHTML = '<option value="">Barbeiro...</option>';
            DB.barbeiros.forEach(b => bSel.innerHTML += `<option value="${b.nome}">${b.nome}</option>`);

            const cSel = document.getElementById('venda-cliente'); cSel.innerHTML = '<option value="">Cliente (Opcional)...</option>';
            DB.clientes.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(c => cSel.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);

            const datalist = document.getElementById('lista-itens-datalist'); datalist.innerHTML = '';
            DB.estoque.forEach(i => datalist.innerHTML += `<option value="${i.nome}">`);

            renderizarListas(); renderizarEquipe(); lucide.createIcons();
        }

        function abrirEditor(tipo, idOuIndex = null) {
            const container = document.getElementById('editor-campos');
            const btnSalvar = document.getElementById('btn-salvar-editor');
            const titulo = document.getElementById('editor-titulo');
            container.innerHTML = '';

            if (tipo === 'venda') {
                titulo.innerText = "Editar Atendimento";
                const v = DB.vendas[idOuIndex];
                container.innerHTML = `
                    <input type="number" id="edit-v-valor" value="${v.valor}" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white outline-none">
                    <select id="edit-v-barb" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white">
                        ${DB.barbeiros.map(b => `<option ${b.nome === v.barbeiro ? 'selected' : ''}>${b.nome}</option>`).join('')}
                    </select>`;
                btnSalvar.onclick = async () => {
                    DB.vendas[idOuIndex].valor = document.getElementById('edit-v-valor').value;
                    DB.vendas[idOuIndex].barbeiro = document.getElementById('edit-v-barb').value;
                    fecharModais(); await salvar(); carregar();
                };
            } else if (tipo === 'cliente' || tipo === 'novo_cliente') {
                titulo.innerText = tipo.includes('novo') ? "Cadastrar Cliente" : "Editar Cliente";
                const c = tipo.includes('novo') ? {nome:'', celular:''} : DB.clientes.find(x => x.id == idOuIndex);
                container.innerHTML = `
                    <input type="text" id="edit-c-nome" value="${c.nome}" placeholder="Nome" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white">
                    <input type="text" id="edit-c-whats" value="${c.celular}" placeholder="WhatsApp" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white">`;
                btnSalvar.onclick = async () => {
                    const n = document.getElementById('edit-c-nome').value;
                    const w = document.getElementById('edit-c-whats').value;
                    if(tipo.includes('novo')) DB.clientes.push({id: Date.now(), nome: n, celular: w, dataUltimo: new Date().toISOString()});
                    else { const i = DB.clientes.findIndex(x => x.id == idOuIndex); DB.clientes[i].nome = n; DB.clientes[i].celular = w; }
                    fecharModais(); await salvar(); carregar();
                };
            } else if (tipo === 'produto' || tipo === 'novo_produto') {
                titulo.innerText = tipo.includes('novo') ? "Cadastrar Item" : "Editar Item";
                const p = tipo.includes('novo') ? {nome:'', preco:'', tipo:'Serviço'} : DB.estoque.find(x => x.id == idOuIndex);
                container.innerHTML = `
                    <input type="text" id="edit-p-nome" value="${p.nome}" placeholder="Nome" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white">
                    <input type="number" id="edit-p-preco" value="${p.preco}" placeholder="Preço" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white">
                    <select id="edit-p-tipo" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white">
                        <option ${p.tipo === 'Serviço' ? 'selected' : ''}>Serviço</option>
                        <option ${p.tipo === 'Produto' ? 'selected' : ''}>Produto</option>
                    </select>`;
                btnSalvar.onclick = async () => {
                    const obj = { id: tipo.includes('novo') ? Date.now() : idOuIndex, nome: document.getElementById('edit-p-nome').value, preco: document.getElementById('edit-p-preco').value, tipo: document.getElementById('edit-p-tipo').value };
                    if(tipo.includes('novo')) DB.estoque.push(obj);
                    else { const i = DB.estoque.findIndex(x => x.id == idOuIndex); DB.estoque[i] = obj; }
                    fecharModais(); await salvar(); carregar();
                };
            } else if (tipo === 'barbeiro' || tipo === 'novo_barbeiro') {
                const b = tipo.includes('novo') ? {nome:''} : DB.barbeiros[idOuIndex];
                titulo.innerText = "Barbeiro";
                container.innerHTML = `<input type="text" id="edit-b-nome" value="${b.nome}" placeholder="Nome" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 text-white outline-none">`;
                btnSalvar.onclick = async () => {
                    const n = document.getElementById('edit-b-nome').value;
                    if(tipo.includes('novo')) DB.barbeiros.push({nome: n, celular: ""});
                    else DB.barbeiros[idOuIndex].nome = n;
                    fecharModais(); await salvar(); carregar();
                };
            }
            
            document.getElementById('modal-editor').style.display = 'flex';
        }

        function switchTab(t) {
            if(['dashboard', 'estoque', 'config', 'clientes'].includes(t)) {
                if(sessionStorage.getItem('is_admin') === 'true') { executarTrocaTab(t); } 
                else { abaDestinoPendente = t; document.getElementById('modal-senha').style.display = 'flex'; }
            } else { executarTrocaTab(t); }
        }

        function executarTrocaTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('active-tab'); b.classList.add('text-slate-500'); });
            const bD = document.getElementById('btn-' + t); if(bD) bD.classList.add('active-tab');
            document.querySelectorAll('.mob-btn').forEach(b => b.classList.replace('text-emerald-400', 'text-slate-500'));
            const bM = Array.from(document.querySelectorAll('.mob-btn')).find(b => b.getAttribute('onclick').includes(t));
            if(bM) bM.classList.replace('text-slate-500', 'text-emerald-400');
            fecharModais();
        }

        function confirmarSenhaAdmin() {
            if(document.getElementById('input-senha-admin').value === SENHA_ADMIN) {
                sessionStorage.setItem('is_admin', 'true'); executarTrocaTab(abaDestinoPendente);
            } else alert("Senha incorreta");
        }

        function fecharModais() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        document.getElementById('form-venda').addEventListener('submit', async function(e) {
            e.preventDefault();
            const agora = new Date();
            DB.vendas.push({ 
                barbeiro: document.getElementById('venda-barbeiro').value, 
                cliente: document.getElementById('venda-cliente').value || "Consumidor", 
                descricao: document.getElementById('venda-descricao').value, 
                valor: document.getElementById('venda-valor').value, 
                pagamento: document.getElementById('venda-pagamento').value,
                eProduto: document.getElementById('venda-e-produto').checked, 
                data: agora.toISOString().split('T')[0],
                hora: agora.getHours().toString().padStart(2, '0') + ':' + agora.getMinutes().toString().padStart(2, '0')
            });
            await salvar(); this.reset(); alert("Registrado!"); carregar();
        });

        function renderizarListas() {
            const cliL = document.getElementById('lista-completa-clientes'); cliL.innerHTML = '';
            DB.clientes.forEach(c => cliL.innerHTML += `
                <div class="glass p-5 rounded-3xl flex justify-between items-center">
                    <div><h4 class="font-bold text-white">${c.nome}</h4><p class="text-xs text-slate-500">${c.celular || 'Sem zap'}</p></div>
                    <button onclick="abrirEditor('cliente', ${c.id})" class="p-2 text-slate-500 hover:text-emerald-400"><i data-lucide="edit-3" size="18"></i></button>
                </div>`);

            const estL = document.getElementById('lista-estoque'); estL.innerHTML = '';
            DB.estoque.forEach(i => estL.innerHTML += `
                <div class="glass p-5 rounded-3xl flex justify-between items-center">
                    <div><p class="font-bold text-white">${i.nome}</p><p class="text-[10px] text-slate-500 uppercase">${i.tipo}</p></div>
                    <div class="flex items-center gap-4">
                        <span class="font-black">${formatarMoeda(parseFloat(i.preco))}</span>
                        <button onclick="abrirEditor('produto', ${i.id})" class="p-2 text-slate-500 hover:text-purple-400"><i data-lucide="edit-3" size="18"></i></button>
                    </div>
                </div>`);
            
            const crm = document.getElementById('crm-lista'); crm.innerHTML = '';
            DB.clientes.forEach(c => {
                const diff = Math.floor((new Date() - new Date(c.dataUltimo)) / (1000*60*60*24));
                if(diff > 20) crm.innerHTML += `<div class="flex justify-between p-4 bg-white/5 rounded-2xl border border-white/5 text-sm"><span>${c.nome}</span><span class="text-rose-400 font-bold">${diff} dias</span></div>`;
            });
        }

        function renderizarEquipe() {
            const listE = document.getElementById('lista-equipe'); listE.innerHTML = '';
            DB.barbeiros.forEach((b, idx) => listE.innerHTML += `
                <div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center">
                    <span>${b.nome}</span>
                    <button onclick="abrirEditor('barbeiro', ${idx})" class="text-slate-500 hover:text-emerald-400"><i data-lucide="edit-3" size="16"></i></button>
                </div>`);
        }

        function atualizarPrecoAutomatico() {
            const item = DB.estoque.find(i => i.nome === document.getElementById('venda-descricao').value);
            if(item) { document.getElementById('venda-valor').value = item.preco; document.getElementById('venda-e-produto').checked = (item.tipo === "Produto"); }
        }

        carregar();
    </script>
</body>
</html>
